<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIT-FLUENCE 관리 시스템 - 통합 관제탑</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; color: #333; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; padding: 40px 30px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--gold); margin-bottom: 50px; font-size: 1.4rem; font-weight: 900; border-left: 5px solid var(--gold); padding-left: 15px; }
        .menu-item { padding: 15px 20px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; color: #666; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        .menu-item.active { background: #fdfaf0; color: var(--gold); font-weight: bold; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .card { background: #fff; padding: 45px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 35px; }
        .tab { display: none; } .tab.active { display: block; }
        .form-group { margin-bottom: 25px; padding: 25px; background: #fafafa; border-radius: 20px; border: 1px solid #eee; }
        label { display: block; margin-bottom: 12px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #fff; border: none; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .btn-sub { background: #333; color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { padding: 18px; border-bottom: 1px solid #eee; text-align: left; }
        #preview { width: 100%; height: 200px; background: #eee; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #ccc; cursor: pointer; position: relative; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        .order-btn { padding: 5px 10px; background: #eee; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; margin-right: 5px; font-size: 0.8rem; }
        .order-btn:hover { background: var(--gold); color: #fff; }
    </style>
</head>
<body id="adminBody" style="display:none;">
    <div class="sidebar">
        <h2>FIT-FLUENCE 관리</h2>
        <div class="menu-item active" onclick="showTab('design', this)">⚙️ 사이트/배너 설정</div>
        <div class="menu-item" onclick="showTab('posts', this)">📝 게시글 관리</div>
        <div class="menu-item" onclick="showTab('survey', this)">📋 설문 주제 생성</div>
        <div class="menu-item" onclick="showTab('consult', this)">👤 상담 신청 명단</div>
        <div style="margin-top:auto;"><a href="index.html" style="text-decoration:none; color:#999; font-weight:bold;">홈페이지 보기 →</a></div>
    </div>

    <div class="main">
        <div id="design" class="tab active">
            <div class="card">
                <h1>⚙️ 통합 관리 및 배너 설정</h1>
                <div class="form-group"><label>🔐 관리자 비번</label><input type="password" id="adminPw"></div>
                <div class="form-group" style="background: #fff9e6; border: 1px solid #ffeeba;">
                    <label>🛡️ 데이터 금고 (서버로 데이터 전송)</label>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn-sub" onclick="backupData()">💾 내보내기</button>
                        <button class="btn-sub" style="background:#ffcc00; color:#000; font-size:1.1rem; padding:15px;" onclick="document.getElementById('importIn').click()">📂 [중요] 서버로 복구 (여기 클릭)</button>
                        <input type="file" id="importIn" style="display:none" onchange="restoreData(this)" accept=".json">
                    </div>
                </div>
                <div class="form-group"><label>🔗 유튜브 배너 링크</label><input type="text" id="bannerLink"></div>
                <div class="form-group"><label>로고 이름</label><input type="text" id="siteLogo"></div>
                <div class="form-group"><label>🖼️ 메인 배경</label><div id="preview" onclick="document.getElementById('fIn').click()"></div><input type="file" id="fIn" style="display:none" onchange="pick(this)" accept="image/*"></div>
                <button class="btn" onclick="saveDesign()">모든 설정 저장하기</button>
            </div>
        </div>

        <div id="posts" class="tab">
            <div class="card">
                <h1>📝 게시글 관리</h1>
                <p style="color:#888; margin-bottom:20px;">* 순서 변경 후 [저장]하지 않아도 즉시 서버에 반영됩니다.</p>
                <button class="btn" style="width:auto; padding:10px 30px; margin-bottom:20px;" onclick="location.href='editor.html'">+ 새 글 쓰기</button>
                <table><thead><tr><th>순서</th><th>카테고리</th><th>제목</th><th>관리</th></tr></thead><tbody id="pTable"></tbody></table>
            </div>
        </div>

        <div id="survey" class="tab">
            <div class="card">
                <h1>📋 설문 주제 생성</h1>
                <div class="form-group">
                    <label>주제</label>
                    <input type="text" id="newT" placeholder="예: 평소 식습관은 어떤가요?">
                    <br><br>
                    <label>옵션(콤마구분)</label>
                    <input type="text" id="newO" placeholder="예: 규칙적임, 불규칙함, 과식이 잦음">
                    <button class="btn" id="addBtn" onclick="addTopic()">주제 추가하기</button>
                </div>
                <div id="topicList"></div>
            </div>
        </div>

        <div id="consult" class="tab"><div class="card"><h1>👤 상담 신청 명단</h1><button onclick="downloadExcel()" style="background:#1D6F42; color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; margin-bottom:15px;">📊 엑셀 다운로드</button><table><thead><tr><th>날짜</th><th>성함</th><th>연락처</th><th>진단내용</th></tr></thead><tbody id="cList"></tbody></table></div></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM",
            authDomain: "fitflunce.firebaseapp.com",
            projectId: "fitflunce",
            storageBucket: "fitflunce.firebasestorage.app",
            messagingSenderId: "186695294427",
            appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        if (sessionStorage.getItem('fit_auth') !== 'true') { location.href = 'index.html'; }
        else { document.getElementById('adminBody').style.display = 'flex'; }

        function showTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active'); 
            if(el) el.classList.add('active');
            if(id === 'consult') loadC(); if(id === 'posts') loadP(); if(id === 'survey') renderTopics();
        }

        let imgData = "";
        async function pick(i) {
            if(i.files[0]) {
                const reader = new FileReader();
                reader.onload = async e => {
                    document.getElementById('preview').innerHTML = "업로드 중...";
                    const ref = storage.ref().child(`config/hero_${Date.now()}.jpg`);
                    const snap = await ref.putString(e.target.result, 'data_url');
                    imgData = await snap.ref.getDownloadURL();
                    document.getElementById('preview').innerHTML = `<img src="${imgData}">`;
                };
                reader.readAsDataURL(i.files[0]);
            }
        }

        async function saveDesign() {
            const cfg = {
                pw: document.getElementById('adminPw').value || "7777",
                bannerLink: document.getElementById('bannerLink').value,
                logo: document.getElementById('siteLogo').value,
                img: imgData || (document.querySelector('#preview img')?.src) || ""
            };
            await db.collection('config').doc('site').set(cfg);
            localStorage.setItem('fitConfig', JSON.stringify(cfg));
            alert('서버 저장 완료!');
        }

        // --- 게시글 관리 (순서 변경 포함) ---
        let globalPosts = [];
        async function loadP() {
            const snap = await db.collection('posts').get();
            globalPosts = [];
            snap.forEach(doc => { var d = doc.data(); d.id = doc.id; globalPosts.push(d); });
            
            // sortIndex가 있는 경우 우선 정렬, 없으면 ID순
            globalPosts.sort((a,b) => (a.sortIndex || 0) - (b.sortIndex || 0));

            const localPs = JSON.parse(localStorage.getItem('fitPosts') || '[]');
            localPs.forEach(lp => { if(!globalPosts.find(cp => String(cp.id) === String(lp.id))) globalPosts.push(lp); });

            renderPostTable();
        }

        function renderPostTable() {
            document.getElementById('pTable').innerHTML = globalPosts.map((p, i) => `
                <tr>
                    <td>
                        <button class="order-btn" onclick="movePost(${i}, -1)">▲</button>
                        <button class="order-btn" onclick="movePost(${i}, 1)">▼</button>
                    </td>
                    <td>${p.category}</td>
                    <td><b>${p.title}</b></td>
                    <td>
                        <button onclick="location.href='editor.html?id=${p.id}'" style="color:blue;border:none;background:none;cursor:pointer;margin-right:10px;font-weight:bold;">수정</button>
                        <button onclick="delP('${p.id}')" style="color:red;border:none;background:none;cursor:pointer;font-weight:bold;">삭제</button>
                    </td>
                </tr>`).join('');
        }

        async function movePost(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= globalPosts.length) return;

            // 위치 바꾸기
            const temp = globalPosts[index];
            globalPosts[index] = globalPosts[newIndex];
            globalPosts[newIndex] = temp;

            renderPostTable();

            // 서버에 순서(sortIndex) 업데이트
            for(let i=0; i < globalPosts.length; i++) {
                const pid = globalPosts[i].id;
                if(pid && pid.length > 5) { // 서버 데이터만 인덱스 업데이트
                    await db.collection('posts').doc(pid).update({ sortIndex: i });
                }
            }
        }

        async function delP(id) {
            if(confirm('삭제?')) {
                try { await db.collection('posts').doc(id).delete(); } catch(e) {}
                globalPosts = globalPosts.filter(p => String(p.id) !== String(id));
                localStorage.setItem('fitPosts', JSON.stringify(globalPosts));
                loadP();
            }
        }

        // --- 기타 로직 ---
        let editIdx = null;
        async function addTopic() {
            const t = document.getElementById('newT').value; const o = document.getElementById('newO').value;
            if(!t || !o) return alert('내용 입력!');
            let s = JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]');
            if(editIdx !== null) { s[editIdx] = {t, o}; editIdx = null; document.getElementById('addBtn').innerText = "주제 추가"; } 
            else { s.push({t, o}); }
            await db.collection('config').doc('surveyMaster').set({ items: s });
            localStorage.setItem('fitSurveyMaster', JSON.stringify(s));
            document.getElementById('newT').value = ""; document.getElementById('newO').value = "";
            renderTopics();
        }

        async function renderTopics() {
            const doc = await db.collection('config').doc('surveyMaster').get();
            let s = doc.exists ? doc.data().items : JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]');
            document.getElementById('topicList').innerHTML = s.map((t, i) => `
                <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${i+1}. ${t.t || t.q}</b><br><small>${t.o}</small></div>
                    <div><button onclick="editT(${i})" style="color:blue;border:none;background:none;cursor:pointer;margin-right:10px;">수정</button>
                    <button onclick="delT(${i})" style="color:red;border:none;background:none;cursor:pointer;">삭제</button></div>
                </div>`).join('');
        }

        function editT(i) {
            const s = JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]');
            document.getElementById('newT').value = s[i].t || s[i].q;
            document.getElementById('newO').value = s[i].o;
            editIdx = i; document.getElementById('addBtn').innerText = "수정 완료";
        }

        async function delT(i) {
            if(confirm('삭제할까요?')) {
                let s = JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]');
                s.splice(i, 1);
                await db.collection('config').doc('surveyMaster').set({ items: s });
                localStorage.setItem('fitSurveyMaster', JSON.stringify(s));
                renderTopics();
            }
        }

        async function loadC() {
            const snap = await db.collection('consults').orderBy('createdAt','desc').get();
            let html = "";
            snap.forEach(doc => {
                const c = doc.data();
                html += `<tr><td>${c.createdAt ? new Date(c.createdAt.seconds*1000).toLocaleString() : ''}</td><td><b>${c.name}</b></td><td>${c.phone}</td><td>${(c.answers||[]).join(', ')}</td></tr>`;
            });
            document.getElementById('cList').innerHTML = html;
        }

        function backupData() {
            const d = { config: localStorage.getItem('fitConfig'), posts: localStorage.getItem('fitPosts'), survey: localStorage.getItem('fitSurveyMaster'), consults: localStorage.getItem('fitConsults') };
            const b = new Blob([JSON.stringify(d)], {type:'application/json'});
            const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `FIT_BACKUP.json`; l.click();
        }

        function restoreData(input) {
            if(!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async e => {
                const data = JSON.parse(e.target.result);
                if(confirm('서버로 전체 복구할까요?')) {
                    if(data.config) await db.collection('config').doc('site').set(JSON.parse(data.config));
                    if(data.survey) await db.collection('config').doc('surveyMaster').set({ items: JSON.parse(data.survey) });
                    if(data.posts) {
                        const ps = JSON.parse(data.posts);
                        for(let i=0; i<ps.length; i++) {
                            await db.collection('posts').doc(String(ps[i].id)).set({ ...ps[i], sortIndex: i });
                        }
                    }
                    alert('완료!'); location.reload();
                }
            };
            reader.readAsText(input.files[0]);
        }

        window.onload = async function() {
            const doc = await db.collection('config').doc('site').get();
            const cfg = doc.exists ? doc.data() : JSON.parse(localStorage.getItem('fitConfig') || '{"pw":"7777"}');
            document.getElementById('adminPw').value = cfg.pw;
            document.getElementById('bannerLink').value = cfg.bannerLink || "";
            document.getElementById('siteLogo').value = cfg.logo || "";
            if(cfg.img) document.getElementById('preview').innerHTML = `<img src="${cfg.img}">`;
            loadP();
        }
    </script>
</body>
</html>
