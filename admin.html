<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIT-FLUENCE 관리 시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: #f4f4f4; height: 100vh; color: #333; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; padding: 40px 30px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--gold); margin-bottom: 50px; font-size: 1.4rem; font-weight: 900; border-left: 5px solid var(--gold); padding-left: 15px; }
        .menu-item { padding: 15px 20px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; color: #666; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        .menu-item.active { background: #fdfaf0; color: var(--gold); font-weight: bold; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .card { background: #fff; padding: 45px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 35px; }
        .tab { display: none; } .tab.active { display: block; }
        .form-group { margin-bottom: 25px; padding: 25px; background: #fafafa; border-radius: 20px; border: 1px solid #eee; }
        label { display: block; margin-bottom: 12px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #fff; border: none; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .btn-sub { background: #333; color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.9rem; }
        .btn-mini { background: #eee; color: #666; border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-mini.active { background: var(--gold); color: #fff; border-color: var(--gold); }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { padding: 18px; border-bottom: 1px solid #eee; text-align: left; }
        #preview { width: 100%; height: 200px; background: #eee; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #ccc; cursor: pointer; position: relative; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        .move-btn { padding: 5px 10px; background: #eee; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-bottom: 2px; }
        #statusOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .cate-badge { background: #eee; color: #666; padding: 4px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }
        .cate-badge.special { background: var(--gold); color: #000; }
    </style>
</head>
<body id="adminBody" style="display:none;">
    <div class="sidebar">
        <h2>FIT-FLUENCE 관리</h2>
        <div class="menu-item active" onclick="showTab('design', this)">⚙️ 사이트/배너 설정</div>
        <div class="menu-item" onclick="showTab('posts', this)">📝 게시글 관리</div>
        <div class="menu-item" onclick="showTab('survey', this)">📋 설문 주제 생성</div>
        <div class="menu-item" onclick="showTab('consult', this)">👤 상담 신청 명단</div>
        <div style="margin-top:auto;"><a href="/" style="text-decoration:none; color:#999; font-weight:bold;">홈페이지 보기 →</a></div>
    </div>

    <div class="main">
        <div id="design" class="tab active">
            <div class="card">
                <h1>⚙️ 사이트 정보 및 배너</h1>
                <div class="form-group"><label>🔗 유튜브 배너 링크</label><input type="text" id="bannerLink"></div>
                <div class="form-group"><label>로고 텍스트</label><input type="text" id="siteLogo"></div>
                <div class="form-group"><label>🖼️ 메인 배경</label><div id="preview" onclick="document.getElementById('fIn').click()">이미지 선택</div><input type="file" id="fIn" style="display:none" onchange="window.pickHero(this)" accept="image/*"></div>
                <button class="btn" onclick="saveDesign()">설정 저장하기</button>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-sub" onclick="exportData()">💾 전체 데이터 백업</button>
                    <button class="btn-sub" onclick="importData()">🔄 데이터 복구</button>
                </div>
            </div>
        </div>

        <div id="posts" class="tab">
            <div class="card">
                <h1>📝 게시글 관리</h1>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div>
                        <button id="btn-pub" class="btn-mini active" onclick="switchPostView('published')">정식 발행 글</button>
                        <button id="btn-draft" class="btn-mini" onclick="switchPostView('draft')">임시저장함</button>
                    </div>
                    <button class="btn" style="width:auto; padding:10px 30px; margin:0;" onclick="location.href='editor.html'">+ 새 글 쓰기</button>
                </div>
                <table><thead><tr><th>순서</th><th>카테고리</th><th>제목</th><th>관리</th></tr></thead><tbody id="pTable"></tbody></table>
            </div>
        </div>

        <div id="survey" class="tab">
            <div class="card">
                <h1>📋 설문 주제 생성</h1>
                <div class="form-group">
                    <label>주제</label><input type="text" id="newT" placeholder="예: 현재 건강 상태는 어떤가요?">
                    <br><br>
                    <label>옵션(콤마구분)</label><input type="text" id="newO" placeholder="예: 매우좋음, 보통, 관리필요">
                    <button class="btn" id="addBtn" onclick="addTopic()">주제 추가</button>
                </div>
                <div id="topicList"></div>
            </div>
        </div>

        <div id="consult" class="tab">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h1>👤 상담 신청 명단</h1>
                    <button class="btn-mini active" onclick="downloadExcel()" style="padding:10px 20px;">📊 엑셀파일 내려받기</button>
                </div>
                <table><thead><tr><th>날짜</th><th>성함</th><th>연락처</th><th>진단내용</th></tr></thead><tbody id="cList"></tbody></table>
            </div>
        </div>
    </div>

    <div id="statusOverlay"><h2 id="statusMsg">처리 중...</h2></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM", authDomain: "fitflunce.firebaseapp.com", projectId: "fitflunce", storageBucket: "fitflunce.firebasestorage.app", messagingSenderId: "186695294427", appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        if (sessionStorage.getItem('fit_auth') !== 'true') { location.href = '/'; }
        else { document.getElementById('adminBody').style.display = 'flex'; }

        function showStatus(msg) { document.getElementById('statusOverlay').style.display = 'flex'; document.getElementById('statusMsg').innerText = msg; }
        function hideStatus() { document.getElementById('statusOverlay').style.display = 'none'; }

        function showTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            if(id === 'consult') loadC(); if(id === 'posts') loadP(); if(id === 'survey') renderTopics();
        }

        async function pickHero(i) {
            if(!i.files[0]) return;
            const reader = new FileReader();
            showStatus("이미지 처리 중...");
            reader.onload = async (e) => {
                document.getElementById('preview').innerHTML = `<img src="${e.target.result}">`;
                hideStatus();
                await saveDesign();
            };
            reader.readAsDataURL(i.files[0]);
        }

        async function saveDesign() {
            showStatus("저장 중...");
            const previewImg = document.querySelector('#preview img');
            const cfg = { bannerLink: document.getElementById('bannerLink').value, logo: document.getElementById('siteLogo').value, img: previewImg ? previewImg.src : "" };
            await db.collection('config').doc('site').set(cfg, {merge: true});
            hideStatus();
        }

        let globalPosts = [];
        let currentPostView = 'published';

        function switchPostView(status) {
            currentPostView = status;
            document.getElementById('btn-pub').classList.toggle('active', status === 'published');
            document.getElementById('btn-draft').classList.toggle('active', status === 'draft');
            renderPostTable();
        }

        async function loadP() {
            showStatus("불러오는 중...");
            const snap = await db.collection('posts').get();
            globalPosts = []; snap.forEach(d => { var data = d.data(); data.id = d.id; globalPosts.push(data); });
            globalPosts.sort((a,b) => (a.sortIndex || 0) - (b.sortIndex || 0));
            renderPostTable();
            hideStatus();
        }

        function renderPostTable() {
            const filtered = globalPosts.filter(p => (p.status || 'published') === currentPostView);
            document.getElementById('pTable').innerHTML = filtered.map((p, i) => {
                const isSpecial = p.category === '프리미엄 카드형' || p.category === '커뮤니티';
                return `
                <tr>
                    <td><button class="move-btn" onclick="movePost(${i}, -1)">▲</button><br><button class="move-btn" onclick="movePost(${i}, 1)">▼</button></td>
                    <td><span class="cate-badge ${isSpecial ? 'special' : ''}">${p.category}</span></td>
                    <td><b>${p.title}</b></td>
                    <td>
                        <button onclick="toggleExpose('${p.id}', ${p.showHome !== false})" class="btn-mini ${p.showHome !== false ? 'active' : ''}" style="width:100px;">${p.showHome !== false ? '✅ 노출' : '❌ 숨김'}</button>
                        <button onclick="location.href='editor.html?id=${p.id}'" style="color:blue;border:none;background:none;cursor:pointer;">수정</button>
                        <button onclick="delP('${p.id}')" style="color:red;border:none;background:none;cursor:pointer;margin-left:10px;">삭제</button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function toggleExpose(id, cur) {
            await db.collection('posts').doc(id).update({ showHome: !cur });
            await loadP();
        }

        async function movePost(idx, dir) {
            const filtered = globalPosts.filter(p => (p.status || 'published') === currentPostView);
            const nIdx = idx + dir;
            if(nIdx < 0 || nIdx >= filtered.length) return;
            const r1 = globalPosts.indexOf(filtered[idx]), r2 = globalPosts.indexOf(filtered[nIdx]);
            const t = globalPosts[r1]; globalPosts[r1] = globalPosts[r2]; globalPosts[r2] = t;
            renderPostTable();
            const batch = db.batch();
            globalPosts.forEach((post, i) => batch.update(db.collection('posts').doc(post.id), { sortIndex: i }));
            await batch.commit();
        }

        async function delP(id) { if(confirm('삭제할까요?')) { await db.collection('posts').doc(id).delete(); await loadP(); } }

        async function addTopic() {
            const t = document.getElementById('newT').value, o = document.getElementById('newO').value;
            if(!t || !o) return;
            const doc = await db.collection('config').doc('surveyMaster').get();
            let s = doc.exists ? doc.data().items : [];
            s.push({t, o});
            await db.collection('config').doc('surveyMaster').set({ items: s });
            document.getElementById('newT').value = ""; document.getElementById('newO').value = "";
            renderTopics();
        }

        async function renderTopics() {
            const doc = await db.collection('config').doc('surveyMaster').get();
            let s = doc.exists ? doc.data().items : [];
            document.getElementById('topicList').innerHTML = s.map((t, i) => `<div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><div><b>${t.t}</b><br><small>${t.o}</small></div><button onclick="delT(${i})" style="color:red;border:none;background:none;cursor:pointer;">삭제</button></div>`).join('');
        }

        async function delT(i) { const doc = await db.collection('config').doc('surveyMaster').get(); let s = doc.data().items; s.splice(i, 1); await db.collection('config').doc('surveyMaster').set({ items: s }); renderTopics(); }

        async function loadC() {
            const snap = await db.collection('consults').orderBy('createdAt','desc').get();
            let html = ""; snap.forEach(doc => { const c = doc.data(); html += `<tr><td>${c.createdAt ? new Date(c.createdAt.seconds*1000).toLocaleString() : ''}</td><td><b>${c.name}</b></td><td>${c.phone}</td><td>${(c.answers||[]).join(', ')}</td></tr>`; });
            document.getElementById('cList').innerHTML = html;
        }

        async function exportData() {
            showStatus("백업 준비 중...");
            try {
                const data = {};
                const collections = ['posts', 'consults', 'config'];
                for(const c of collections) {
                    const snap = await db.collection(c).get();
                    data[c] = [];
                    snap.forEach(doc => data[c].push({id: doc.id, ...doc.data()}));
                }
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `fitfluence_backup_${new Date().toLocaleDateString()}.json`;
                a.click();
                hideStatus();
                alert("백업 파일이 생성되었습니다.");
            } catch(e) { hideStatus(); alert("백업 실패: " + e.message); }
        }

        async function importData() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                if(!confirm("복구를 진행하면 기존 데이터와 충돌할 수 있습니다. 계속할까요?")) return;
                showStatus("데이터 복구 중...");
                const reader = new FileReader();
                reader.onload = async (re) => {
                    try {
                        const data = JSON.parse(re.target.result);
                        for(const col in data) {
                            for(const item of data[col]) {
                                const {id, ...content} = item;
                                await db.collection(col).doc(id).set(content, {merge: true});
                            }
                        }
                        hideStatus(); alert("데이터 복구가 완료되었습니다. 페이지를 새로고침하세요.");
                        location.reload();
                    } catch(err) { hideStatus(); alert("복구 실패: " + err.message); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        async function downloadExcel() {
            const snap = await db.collection('consults').orderBy('createdAt','desc').get();
            let csv = "\ufeff날짜,성함,연락처,진단내용\n";
            snap.forEach(doc => {
                const c = doc.data();
                const date = c.createdAt ? new Date(c.createdAt.seconds*1000).toLocaleString() : '';
                const answers = (c.answers||[]).join(' | ').replace(/,/g, '');
                csv += `${date},${c.name},${c.phone},${answers}\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `상담신청자명단_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        window.onload = async function() {
            const doc = await db.collection('config').doc('site').get();
            if(doc.exists) {
                const cfg = doc.data();
                document.getElementById('bannerLink').value = cfg.bannerLink || "";
                document.getElementById('siteLogo').value = cfg.logo || "";
                if(cfg.img) document.getElementById('preview').innerHTML = `<img src="${cfg.img}">`;
            }
            loadP();
        }
    </script>
</body>
</html>
