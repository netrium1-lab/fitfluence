<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIT-FLUENCE 관리 시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; color: #333; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; padding: 40px 30px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--gold); margin-bottom: 50px; font-size: 1.4rem; font-weight: 900; border-left: 5px solid var(--gold); padding-left: 15px; }
        .menu-item { padding: 15px 20px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; color: #666; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        .menu-item.active { background: #fdfaf0; color: var(--gold); font-weight: bold; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .card { background: #fff; padding: 45px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 35px; }
        .tab { display: none; } .tab.active { display: block; }
        .form-group { margin-bottom: 25px; padding: 25px; background: #fafafa; border-radius: 20px; border: 1px solid #eee; }
        label { display: block; margin-bottom: 12px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #fff; border: none; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .btn-sub { background: #333; color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { padding: 18px; border-bottom: 1px solid #eee; text-align: left; }
        #preview { width: 100%; height: 200px; background: #eee; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #ccc; cursor: pointer; position: relative; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
        .move-btn { padding: 5px 10px; background: #eee; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-bottom: 2px; }
        #statusOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body id="adminBody" style="display:none;">
    <div class="sidebar">
        <h2>FIT-FLUENCE 관리</h2>
        <div class="menu-item active" onclick="showTab('design', this)">⚙️ 사이트/배너 설정</div>
        <div class="menu-item" onclick="showTab('posts', this)">📝 게시글 관리</div>
        <div class="menu-item" onclick="showTab('survey', this)">📋 설문 주제 생성</div>
        <div class="menu-item" onclick="showTab('consult', this)">👤 상담 신청 명단</div>
        <div style="margin-top:auto;"><a href="index.html" style="text-decoration:none; color:#999; font-weight:bold;">홈페이지 보기 →</a></div>
    </div>

    <div class="main">
        <div id="design" class="tab active">
            <div class="card">
                <h1>⚙️ 통합 관리 및 배너 설정</h1>
                <div class="form-group"><label>🔐 관리자 비번</label><input type="password" id="adminPw"></div>
                <div class="form-group" style="background: #fff9e6; border: 1px solid #ffeeba;">
                    <label>🛡️ 데이터 금고 (서버 전송)</label>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn-sub" onclick="backupData()">💾 내보내기</button>
                        <button class="btn-sub" style="background:#ffcc00; color:#000; font-size:1.1rem; padding:15px;" onclick="document.getElementById('importIn').click()">📂 [중요] 서버로 복구 (여기 클릭)</button>
                        <input type="file" id="importIn" style="display:none" onchange="restoreData(this)" accept=".json">
                    </div>
                </div>
                <div class="form-group"><label>🔗 유튜브 배너 링크</label><input type="text" id="bannerLink"></div>
                <div class="form-group"><label>로고 이름</label><input type="text" id="siteLogo"></div>
                <div class="form-group"><label>🖼️ 메인 배경</label><div id="preview" onclick="document.getElementById('fIn').click()">이미지 선택</div><input type="file" id="fIn" style="display:none" onchange="window.pickHero(this)" accept="image/*"></div>
                <button class="btn" onclick="saveDesign()">모든 설정 서버 저장하기</button>
            </div>
        </div>

        <div id="posts" class="tab"><div class="card"><h1>📝 게시글 관리</h1><button class="btn" style="width:auto; padding:10px 30px;" onclick="location.href='editor.html'">+ 새 글 쓰기</button><table><thead><tr><th>순서</th><th>카테고리</th><th>제목</th><th>관리</th></tr></thead><tbody id="pTable"></tbody></table></div></div>

        <div id="survey" class="tab">
            <div class="card">
                <h1>📋 설문 주제 생성</h1>
                <div class="form-group">
                    <label>주제</label><input type="text" id="newT" placeholder="예: 평소 식습관은 어떤가요?">
                    <br><br>
                    <label>옵션(콤마구분)</label><input type="text" id="newO" placeholder="예: 규칙적임, 불규칙함, 과식이 잦음">
                    <button class="btn" id="addBtn" onclick="addTopic()">주제 추가하기</button>
                </div>
                <div id="topicList"></div>
            </div>
        </div>

        <div id="consult" class="tab"><div class="card"><h1>👤 상담 신청 명단</h1><button onclick="downloadExcel()" style="background:#1D6F42; color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; margin-bottom:15px;">📊 엑셀 다운로드</button><table><thead><tr><th>날짜</th><th>성함</th><th>연락처</th><th>진단내용</th></tr></thead><tbody id="cList"></tbody></table></div></div>
    </div>

    <div id="statusOverlay"><h2 id="statusMsg">서버 처리 중...</h2><p id="statusSub">창을 닫지 마세요.</p></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM",
            authDomain: "fitflunce.firebaseapp.com",
            projectId: "fitflunce",
            storageBucket: "fitflunce.appspot.com",
            messagingSenderId: "186695294427",
            appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        if (sessionStorage.getItem('fit_auth') !== 'true') { location.href = 'index.html'; }
        else { document.getElementById('adminBody').style.display = 'flex'; }

        function showStatus(msg, sub = "") { document.getElementById('statusOverlay').style.display = 'flex'; document.getElementById('statusMsg').innerText = msg; document.getElementById('statusSub').innerText = sub; }
        function hideStatus() { document.getElementById('statusOverlay').style.display = 'none'; }

        function showTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            if(id === 'consult') loadC(); if(id === 'posts') loadP(); if(id === 'survey') renderTopics();
        }

        async function pickHero(i) {
            if(!i.files[0]) return;
            const file = i.files[0];
            
            // 파일 크기 체크 (5MB 제한)
            if (file.size > 5 * 1024 * 1024) {
                alert("파일 크기가 너무 큽니다. (5MB 이하만 가능)");
                return;
            }

            try {
                showStatus("서버 준비 중...", "연결을 확인하고 있습니다.");
                
                const fileName = `hero_${Date.now()}.jpg`;
                const storageRef = storage.ref().child(`config/${fileName}`);
                const metadata = { contentType: file.type || 'image/jpeg' };
                
                showStatus("전송 준비 완료", "이미지를 업로드합니다.");
                
                // 더 안정적인 put(file) 방식으로 변경
                const uploadTask = storageRef.put(file, metadata);
                
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                        showStatus("이미지 전송 중...", progress + "% 완료");
                    }, 
                    (error) => {
                        console.error("Upload Error Details:", error);
                        alert("업로드 실패: " + error.message + "\n(인터넷 연결이나 Firebase 설정을 확인해주세요)");
                        hideStatus();
                    }, 
                    async () => {
                        const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                        document.getElementById('preview').innerHTML = `<img src="${downloadURL}">`;
                        hideStatus();
                        // 이미지 URL을 포함해 설정을 서버에 자동 저장
                        await saveDesign();
                        alert("메인 배경 이미지가 성공적으로 변경되었습니다!");
                    }
                );
            } catch (err) {
                console.error("Critical Upload Error:", err);
                alert("처리 중 오류 발생: " + err.message);
                hideStatus();
            }
        }
        window.pickHero = pickHero;

        async function saveDesign() {
            showStatus("설정값 서버 저장 중...");
            const previewImg = document.querySelector('#preview img');
            const cfg = {
                pw: document.getElementById('adminPw').value || "7777",
                bannerLink: document.getElementById('bannerLink').value,
                logo: document.getElementById('siteLogo').value,
                img: previewImg ? previewImg.src : ""
            };
            try {
                await db.collection('config').doc('site').set(cfg);
                localStorage.setItem('fitConfig', JSON.stringify(cfg));
                // alert('서버 저장 완료!');
            } catch(e) { alert("서버 저장 오류: " + e.message); }
            hideStatus();
        }

        let globalPosts = [];
        async function loadP() {
            const snap = await db.collection('posts').get();
            globalPosts = []; snap.forEach(d => { var data = d.data(); data.id = d.id; globalPosts.push(data); });
            globalPosts.sort((a,b) => (a.sortIndex || 0) - (b.sortIndex || 0));
            renderPostTable();
        }

        function renderPostTable() {
            document.getElementById('pTable').innerHTML = globalPosts.map((p, i) => `
                <tr>
                    <td>
                        <button class="move-btn" onclick="movePost(${i}, -1)">▲</button><br>
                        <button class="move-btn" onclick="movePost(${i}, 1)">▼</button>
                    </td>
                    <td>${p.category}</td>
                    <td><b>${p.title}</b></td>
                    <td>
                        <button onclick="location.href='editor.html?id=${p.id}'" style="color:blue;border:none;background:none;font-weight:bold;cursor:pointer;">수정</button>
                        <button onclick="delP('${p.id}')" style="color:red;border:none;background:none;font-weight:bold;cursor:pointer;margin-left:10px;">삭제</button>
                    </td>
                </tr>`).join('');
        }

        async function movePost(idx, dir) {
            const newIdx = idx + dir;
            if(newIdx < 0 || newIdx >= globalPosts.length) return;
            
            showStatus("순서 변경 중...");
            const temp = globalPosts[idx]; 
            globalPosts[idx] = globalPosts[newIdx]; 
            globalPosts[newIdx] = temp;
            
            renderPostTable();
            
            try {
                const batch = db.batch();
                globalPosts.forEach((post, i) => {
                    if(post.id && post.id.length > 5) {
                        const ref = db.collection('posts').doc(post.id);
                        batch.update(ref, { sortIndex: i });
                    }
                });
                await batch.commit();
            } catch(e) { 
                alert("순서 저장 실패: " + e.message); 
                loadP(); // 실패 시 데이터 재로드
            }
            hideStatus();
        }

        async function delP(id) { 
            if(confirm('정말 삭제할까요?')) { 
                showStatus("게시글 삭제 중...");
                try {
                    await db.collection('posts').doc(id).delete(); 
                    await loadP(); 
                } catch(e) { alert("삭제 실패: " + e.message); }
                hideStatus();
            } 
        }

        let editIdx = null;
        async function addTopic() {
            const t = document.getElementById('newT').value; const o = document.getElementById('newO').value;
            if(!t || !o) return alert('내용 입력!');
            const doc = await db.collection('config').doc('surveyMaster').get();
            let s = doc.exists ? doc.data().items : [];
            if(editIdx !== null) { s[editIdx] = {t, o}; editIdx = null; } else { s.push({t, o}); }
            await db.collection('config').doc('surveyMaster').set({ items: s });
            localStorage.setItem('fitSurveyMaster', JSON.stringify(s));
            document.getElementById('newT').value = ""; document.getElementById('newO').value = "";
            renderTopics();
        }

        async function renderTopics() {
            const doc = await db.collection('config').doc('surveyMaster').get();
            let s = doc.exists ? doc.data().items : JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]');
            document.getElementById('topicList').innerHTML = s.map((t, i) => `<div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><div><b>${i+1}. ${t.t || t.q}</b><br><small>${t.o}</small></div><div><button onclick="editT(${i})" style="color:blue;border:none;background:none;font-weight:bold;margin-right:10px;cursor:pointer;">수정</button><button onclick="delT(${i})" style="color:red;border:none;background:none;cursor:pointer;">삭제</button></div></div>`).join('');
        }

        function editT(i) {
            db.collection('config').doc('surveyMaster').get().then(doc => {
                const s = doc.data().items;
                document.getElementById('newT').value = s[i].t || s[i].q; document.getElementById('newO').value = s[i].o;
                editIdx = i; document.getElementById('addBtn').innerText = "수정 완료";
            });
        }

        async function delT(i) { if(confirm('삭제?')) { const doc = await db.collection('config').doc('surveyMaster').get(); let s = doc.data().items; s.splice(i, 1); await db.collection('config').doc('surveyMaster').set({ items: s }); renderTopics(); } }

        async function loadC() {
            const snap = await db.collection('consults').orderBy('createdAt','desc').get();
            let html = ""; snap.forEach(doc => { const c = doc.data(); html += `<tr><td>${c.createdAt ? new Date(c.createdAt.seconds*1000).toLocaleString() : ''}</td><td><b>${c.name}</b></td><td>${c.phone}</td><td>${(c.answers||[]).join(', ')}</td></tr>`; });
            document.getElementById('cList').innerHTML = html;
        }

        function backupData() { const d = { config: localStorage.getItem('fitConfig'), posts: localStorage.getItem('fitPosts'), survey: localStorage.getItem('fitSurveyMaster'), consults: localStorage.getItem('fitConsults') }; const b = new Blob([JSON.stringify(d)], {type:'application/json'}); const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `FIT_BACKUP.json`; l.click(); }

        async function restoreData(input) {
            if(!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async e => {
                const data = JSON.parse(e.target.result);
                if(confirm('서버 복구를 시작할까요?')) {
                    showStatus("데이터 분석 중...");
                    try {
                        if(data.config) await db.collection('config').doc('site').set(JSON.parse(data.config));
                        if(data.survey) await db.collection('config').doc('surveyMaster').set({ items: JSON.parse(data.survey) });
                        if(data.posts) {
                            const ps = JSON.parse(data.posts);
                            for(let i=0; i<ps.length; i++) {
                                showStatus(`게시글 복구 중 (${i+1}/${ps.length})`);
                                let p = ps[i]; if(p.image && p.image.length > 500000) p.image = "";
                                await db.collection('posts').doc(String(p.id)).set({ ...p, sortIndex: i });
                            }
                        }
                        alert('서버 복구 완료!'); location.reload();
                    } catch(err) { alert(err.message); }
                    hideStatus();
                }
            };
            reader.readAsText(input.files[0]);
        }

        window.onload = async function() {
            const doc = await db.collection('config').doc('site').get();
            const cfg = doc.exists ? doc.data() : JSON.parse(localStorage.getItem('fitConfig') || '{"pw":"7777"}');
            document.getElementById('adminPw').value = cfg.pw;
            document.getElementById('bannerLink').value = cfg.bannerLink || "";
            document.getElementById('siteLogo').value = cfg.logo || "";
            if(cfg.img) document.getElementById('preview').innerHTML = `<img src="${cfg.img}">`;
            loadP();
        }
    </script>
</body>
</html>
