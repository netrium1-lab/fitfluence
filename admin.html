<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIT-FLUENCE 관리 시스템 - 통합 관제탑</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --gold: #D4AF37; --gold-grad: linear-gradient(135deg, #F2E3B1 0%, #D4AF37 50%, #A68911 100%); --bg: #0a0a0a; --card: #151515; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; color: #fff; overflow: hidden; }
        
        /* [핵심] 기본적으로 모든 요소를 숨김 (나중에 JS로 보임 처리) */
        .sidebar { width: 300px; background: #000; border-right: 1px solid #222; padding: 40px 30px; flex-shrink: 0; display: none; flex-direction: column; }
        .sidebar h2 { color: var(--gold); margin-bottom: 50px; font-size: 1.6rem; font-weight: 900; border-left: 5px solid var(--gold); padding-left: 15px; }
        .menu-item { padding: 18px 25px; cursor: pointer; border-radius: 15px; margin-bottom: 12px; color: #fff; font-weight: 600; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: #222; color: var(--gold); }

        .main { flex: 1; padding: 60px; overflow-y: auto; display: none; }
        .card { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid #222; margin-bottom: 35px; }
        .tab { display: none; } .tab.active { display: block; }
        
        h1 { color: #fff; font-weight: 900; margin-bottom: 30px; font-size: 1.8rem; }
        label { display: block; margin-bottom: 12px; font-weight: 800; color: var(--gold); }
        input, select, textarea { width: 100%; padding: 18px; background: #000; border: 1px solid #333; color: #fff; border-radius: 15px; margin-bottom: 20px; font-size: 1rem; }
        
        .btn-gold { background: var(--gold-grad); color: #000; border: none; padding: 15px 35px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); }
        .btn-sm { padding: 8px 15px; font-size: 0.85rem; margin-left: 5px; font-weight: bold; }
        .btn-excel { background: #1D6F42; color: #fff; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a1a1a; color: var(--gold); padding: 18px; text-align: left; border-bottom: 2px solid #333; }
        td { padding: 18px; border-bottom: 1px solid #222; color: #fff; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 9999; align-items:center; justify-content:center; }
        .modal-inner { background:#111; padding:50px; border-radius:40px; border:1px solid var(--gold); max-width:650px; width:90%; max-height:85vh; overflow-y:auto; color: #fff; }
        
        #preview { width: 100%; height: 200px; background: #000; border: 1px solid #333; border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        #preview img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <h2>FIT-FLUENCE 관리</h2>
        <div class="menu-item active" onclick="showTab('tab-design', this)">⚙️ 사이트 설정</div>
        <div class="menu-item" onclick="showTab('tab-posts', this)">📝 게시글 관리</div>
        <div class="menu-item" onclick="showTab('tab-survey', this)">📊 설문 항목</div>
        <div class="menu-item" onclick="showTab('tab-consult', this)">👤 상담 명단</div>
        <div class="menu-item" style="margin-top:auto; color:#888;" onclick="handleLogout()">🚪 로그아웃</div>
    </div>

    <div id="main" class="main">
        <div id="tab-design" class="tab active">
            <div class="card" style="background:#1a1500; border-color:var(--gold);">
                <h3 style="color:var(--gold); margin-bottom:20px;">🛡️ 데이터 금고</h3>
                <button class="btn-gold" onclick="backup()">💾 백업하기</button>
                <button class="btn-gold" style="background:#444; color:#fff;" onclick="document.getElementById('reFile').click()">📂 복구하기</button>
                <input type="file" id="reFile" style="display:none" onchange="restore(this)">
            </div>
            <div class="card">
                <h1>⚙️ 사이트 기본 설정</h1>
                <label>로고 이름</label><input type="text" id="siteLogo">
                <label>🔗 배너 링크</label><input type="text" id="bannerLink">
                <label>🖼️ 메인 배경</label>
                <div id="preview"></div>
                <input type="file" onchange="pickHero(this)" accept="image/*">
                <button class="btn-gold" onclick="saveDesign()">설정 저장</button>
            </div>
        </div>

        <div id="tab-posts" class="tab">
            <div class="card">
                <h1>📝 게시글 관리</h1>
                <button class="btn-gold" onclick="location.href='editor.html'">+ 새 글 쓰기</button>
                <table><thead><tr><th>제목</th><th>관리</th></tr></thead><tbody id="pList"></tbody></table>
            </div>
        </div>

        <div id="tab-survey" class="tab">
            <div class="card">
                <h1 id="sHeader">📊 설문 항목 관리</h1>
                <input type="hidden" id="editSurveyIdx">
                <label>질문</label><input type="text" id="newT">
                <label>옵션 (콤마 구분)</label><input type="text" id="newO">
                <button class="btn-gold" id="sSaveBtn" onclick="saveSurvey()">저장/추가</button>
                <button class="btn-gold" style="background:#444; color:#fff; display:none;" id="sCancelBtn" onclick="resetSurveyForm()">취소</button>
                <div id="sList" style="margin-top:40px;"></div>
            </div>
        </div>

        <div id="tab-consult" class="tab">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>👤 상담 명단</h1>
                    <button class="btn-excel" onclick="exportToExcel()">엑셀 다운로드</button>
                </div>
                <table><thead><tr><th>날짜</th><th>이름</th><th>연락처</th><th>상세</th></tr></thead><tbody id="consultList"></tbody></table>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-inner">
            <h2 style="color:var(--gold); margin-bottom:30px;">📋 상세 내역</h2>
            <div id="detailContent" style="line-height:2.2; font-size:1.1rem;"></div>
            <button onclick="document.getElementById('detailModal').style.display='none'" class="btn-gold" style="width:100%; margin-top:30px;">확인</button>
        </div>
    </div>

    <script type="module">
        import * as firebase from './firebase-logic.js';

        let heroImgData = "";

        // 모든 전역 함수 window 연결
        window.showTab = (id, el) => {
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            renderAll();
        };

        window.pickHero = (i) => {
            if(i.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 1200; const scale = MAX / img.width;
                        canvas.width = MAX; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        heroImgData = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('preview').innerHTML = `<img src="${heroImgData}">`;
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        };

        window.saveDesign = async () => {
            let current = {}; try { current = await firebase.getConfig() || {}; } catch(e){}
            let finalImg = current.img;
            if (heroImgData) { try { finalImg = await firebase.uploadImage('config/hero.jpg', heroImgData); } catch(e) { finalImg = heroImgData; } }
            const cfg = { logo: document.getElementById('siteLogo').value, bannerLink: document.getElementById('bannerLink').value, img: finalImg };
            try { await firebase.updateConfig(cfg); alert('저장 완료!'); } catch(e) { console.error(e); }
        };

        window.saveSurvey = async () => {
            const t = document.getElementById('newT').value; const o = document.getElementById('newO').value;
            const idx = document.getElementById('editSurveyIdx').value;
            if(!t || !o) return alert('내용을 입력하세요.');
            let s = []; try { s = await firebase.getSurveyMasterItems(); } catch(e) { s = JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]'); }
            if(idx !== "") s[idx] = {t, o}; else s.push({t, o});
            try { await firebase.updateSurveyMaster(s); resetSurveyForm(); renderAll(); } catch(e) { console.error(e); }
        };

        window.editS = async (i) => {
            let s_list = []; try { s_list = await firebase.getSurveyMasterItems(); } catch(e) { s_list = JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]'); }
            const s = s_list[i];
            document.getElementById('newT').value = s.t; document.getElementById('newO').value = s.o;
            document.getElementById('editSurveyIdx').value = i;
            document.getElementById('sHeader').innerText = "✏️ 항목 수정 중...";
            document.getElementById('sSaveBtn').innerText = "수정 완료";
            document.getElementById('sCancelBtn').style.display = "inline-block";
        };

        window.resetSurveyForm = () => {
            document.getElementById('newT').value = ""; document.getElementById('newO').value = "";
            document.getElementById('editSurveyIdx').value = "";
            document.getElementById('sHeader').innerText = "📊 설문 항목 관리";
            document.getElementById('sSaveBtn').innerText = "저장/추가";
            document.getElementById('sCancelBtn').style.display = "none";
        };

        const renderAll = async () => {
            console.log("Rendering all...");
            let ps = []; try { ps = await firebase.getPosts(); } catch(e) {}
            document.getElementById('pList').innerHTML = ps.map(p => `
                <tr><td><b>${p.title}</b></td><td>
                    <button class="btn-gold btn-sm" onclick="location.href='editor.html?id=${p.id}'">수정</button>
                    <button class="btn-gold btn-sm" style="background:red; color:#fff;" onclick="delP('${p.id}')">삭제</button>
                </td></tr>`).join('');
            
            let ss = []; try { ss = await firebase.getSurveyMasterItems(); } catch(e) {}
            document.getElementById('sList').innerHTML = ss.map((s, i) => `
                <div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${s.t}</b> <small>(${s.o})</small></span>
                    <div><button class="btn-gold btn-sm" onclick="editS(${i})">수정</button><button class="btn-gold btn-sm" style="background:red; color:#fff;" onclick="delS(${i})">삭제</button></div>
                </div>`).join('');

            let cs = []; try { cs = await firebase.getConsults(); } catch(e) {}
            document.getElementById('consultList').innerHTML = cs.map((c, i) => `
                <tr><td>${c.date}</td><td><b>${c.name}</b></td><td>${c.phone}</td><td><button class="btn-gold btn-sm" onclick="showDetail(${i})">보기</button></td></tr>`).join('');
        };

        window.showDetail = async (i) => {
            let cs = []; try { cs = await firebase.getConsults(); } catch(e) {}
            const d = cs[i];
            let html = `<p><b>이름:</b> ${d.name}</p><p><b>연락처:</b> ${d.phone}</p><hr style="border-top:1px solid #333;">`;
            d.answers.forEach(a => html += `<p>${a}</p>`);
            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('detailModal').style.display = 'flex';
        };

        window.handleLogout = () => { if(confirm('로그아웃?')) { sessionStorage.removeItem('fit_auth'); location.reload(); } };
        window.backup = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(localStorage)], {type:'application/json'})); a.download = 'BACKUP.json'; a.click(); };

        window.restore = (i) => {
            const reader = new FileReader();
            reader.onload = async e => {
                try {
                    const data = JSON.parse(e.target.result);
                    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                    if(confirm('Firebase 동기화?')) {
                        if(data.fitConfig) await firebase.updateConfig(JSON.parse(data.fitConfig));
                        if(data.fitSurveyMaster) await firebase.updateSurveyMaster(JSON.parse(data.fitSurveyMaster));
                        if(data.fitPosts) { for(const p of JSON.parse(data.fitPosts)) { await firebase.savePost(p.id, p); } }
                        alert('완료');
                    }
                    location.reload();
                } catch(err) { alert('실패'); }
            };
            reader.readAsText(i.files[0]);
        };

        window.delP = async (id) => { if(confirm('삭제?')) { await firebase.deletePost(id); renderAll(); } };
        window.delS = async (i) => { if(confirm('삭제?')) { let ss = await firebase.getSurveyMasterItems(); ss.splice(i,1); await firebase.updateSurveyMaster(ss); renderAll(); } };

        // [핵심 로직] 비밀번호 체크 및 화면 로드
        window.onload = async () => {
            console.log("Window loaded, checking password...");
            
            if (sessionStorage.getItem('fit_auth') !== 'true') {
                const code = prompt('관리자 비밀번호를 입력하세요.');
                if (code === "7777") {
                    sessionStorage.setItem('fit_auth', 'true');
                } else {
                    alert('비밀번호가 일치하지 않습니다.');
                    location.href = 'index.html';
                    return;
                }
            }

            // [핵심] 인증 통과 시 강제로 모든 스타일 display 변경
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main').style.display = 'block';

            // 데이터 로드
            try {
                let cfg = await firebase.getConfig() || {};
                document.getElementById('siteLogo').value = cfg.logo || "";
                document.getElementById('bannerLink').value = cfg.bannerLink || "";
                if(cfg.img) { heroImgData = cfg.img; document.getElementById('preview').innerHTML = `<img src="${cfg.img}">`; }
                renderAll();
            } catch (e) {
                console.warn("Initial data load error:", e);
                renderAll(); // 실패해도 로컬 데이터 기반으로라도 렌더링 시도
            }
        };
    </script>
</body>
</html>
