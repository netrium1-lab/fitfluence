<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 시나리오 작가 - FIT-FLUENCE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        .ai-container { max-width: 800px; margin: 100px auto; padding: 20px; background: #111; border-radius: 20px; border: 1px solid var(--gold); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--gold); font-weight: bold; }
        textarea { width: 100%; height: 100px; background: #222; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; font-size: 1rem; resize: none; }
        .gen-btn { width: 100%; padding: 20px; background: var(--metallic-gold); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        .result-area { margin-top: 30px; padding: 20px; background: #050505; border-radius: 15px; border: 1px dashed #444; min-height: 200px; white-space: pre-wrap; line-height: 1.8; }
        .loading { display: none; text-align: center; color: var(--gold); margin: 20px 0; }
    </style>
</head>
<body>
    <div class="ai-container">
        <h1 style="color: var(--gold); margin-bottom: 30px; text-align: center;">🎬 AI 시나리오 작가</h1>
        
        <div class="input-group">
            <label for="prompt">어떤 영상의 시나리오를 만들까요?</label>
            <textarea id="prompt" placeholder="예: 토탈스위스 핏솔루션이 왜 건강에 좋은지 설명하는 60초 광고 영상"></textarea>
        </div>

        <button id="generateBtn" class="gen-btn">시나리오 생성하기 ✨</button>

        <div id="loader" class="loading">Gemini AI가 시나리오를 집필 중입니다... 잠시만 기다려주세요.</div>
        
        <div id="result" class="result-area">생성된 시나리오가 여기에 표시됩니다.</div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const prompt = document.getElementById('prompt').value;
            if (!prompt) return alert('주제를 입력해주세요!');

            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('result');
            const btn = document.getElementById('generateBtn');

            loader.style.display = 'block';
            resultArea.innerText = '';
            btn.disabled = true;

            try {
                // 우리가 만든 Firebase Function API 호출
                const response = await fetch('/api/generateScenario', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                if (data.status === 'success') {
                    resultArea.innerText = data.scenario;
                } else {
                    resultArea.innerText = '오류가 발생했습니다: ' + data.message;
                }
            } catch (error) {
                resultArea.innerText = '서버 연결 실패: ' + error.message;
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
