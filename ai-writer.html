<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT-FLUENCE AI MASTER STUDIO v4.9.1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --metallic-gold: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 51%, #fbdf93 100%);
            --black: #000;
            --panel-bg: #0a0a0a;
            --border: #222;
            --accent: #FF3D00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--black); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { height: 50px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 100; }
        h1 { background: var(--metallic-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1rem; font-weight: 900; letter-spacing: 1px; }

        .header-btns { display: flex; gap: 8px; }
        .h-btn { background: #111; border: 1px solid #333; color: #888; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; transition: 0.3s; }
        .h-btn:hover { border-color: var(--gold); color: #fff; }

        .main-container { flex-grow: 1; display: flex; overflow: hidden; height: calc(100vh - 120px); }
        .panel { height: 100%; display: flex; flex-direction: column; border-right: 1px solid var(--border); padding: 15px; position: relative; }
        .panel-header { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .panel-title { color: var(--gold); font-weight: 800; font-size: 0.85rem; letter-spacing: 1px; }

        .settings-btn-inline { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 4px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }

        /* 1구역: 시나리오 */
        .zone-scenario { width: 28%; background: #050505; }
        #chatHistory { flex-grow: 1; overflow-y: auto; gap: 10px; display: flex; flex-direction: column; padding-bottom: 10px; }
        .msg { padding: 10px 12px; border-radius: 12px; font-size: 0.8rem; line-height: 1.5; max-width: 95%; }
        .ai-msg { background: #111; border: 1px solid #222; color: #ccc; align-self: flex-start; }
        .user-msg { background: var(--gold); color: #000; align-self: flex-end; font-weight: bold; }

        .ai-msg table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.75rem; background: #000; border-radius: 8px; overflow: hidden; }
        .ai-msg th { background: #222; color: var(--gold); padding: 8px; border: 1px solid #333; text-align: left; }
        .ai-msg td { padding: 8px; border: 1px solid #333; color: #eee; }

        /* 2구역: 비주얼 */
        .zone-visual { width: 36%; background: #0a0a0a; }
        .char-library { background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .char-list { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; margin-top: 5px; min-height: 60px; }
        .char-card { min-width: 60px; max-width: 60px; background: #000; border: 2px solid #444; border-radius: 8px; position: relative; cursor: pointer; overflow: hidden; }
        .char-card.active { border-color: var(--gold); }
        .char-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .option-group { margin-bottom: 12px; }
        .option-label { font-size: 0.7rem; color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .opt-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 8px 2px; border-radius: 6px; font-size: 0.6rem; cursor: pointer; text-align: center; }
        .opt-btn.active { border-color: var(--gold); color: var(--gold); font-weight: bold; background: rgba(212,175,55,0.1); }

        .gallery { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .asset-card { background: #111; border: 1px solid #222; border-radius: 10px; overflow: hidden; border-left: 4px solid var(--gold); }
        .asset-card img, .asset-card video { width: 100%; display: block; background: #000; object-fit: contain; }
        
        .asset-edit-box { padding: 10px; background: #050505; border-top: 1px solid #222; }
        .asset-edit-box textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; font-size: 0.7rem; border-radius: 5px; height: 50px; outline: none; resize: none; margin-bottom: 5px; }
        .small-btn-group { display: flex; gap: 5px; }
        .small-btn { flex: 1; padding: 6px; font-size: 0.65rem; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-listen { background: #333; color: #fff; }
        .btn-redo { background: var(--gold); color: #000; }

        /* 3구역: 모션 */
        .zone-motion { width: 36%; background: #050505; border-right: none; }

        .auto-btn { width: 100%; padding: 14px; background: var(--metallic-gold); color: #432c00; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 8px; font-size: 0.8rem; }
        .video-btn { background: var(--accent); color: #fff; }
        .loader { display: none; font-size: 0.65rem; color: var(--gold); text-align: center; padding: 10px; }

        .master-player-bar { height: 70px; background: #0a0a0a; border-top: 1px solid var(--gold); display: flex; align-items: center; padding: 0 30px; justify-content: space-between; z-index: 200; }
        .subtitle-box { color: var(--gold); font-size: 0.95rem; font-weight: 900; flex-grow: 1; text-align: center; padding: 0 20px; }
        .play-btn { background: var(--gold); color: #000; border: none; padding: 10px 30px; border-radius: 20px; font-weight: 900; font-size: 1rem; cursor: pointer; display: none; }

        #projectModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; border: 1px solid var(--gold); }
        .project-list { max-height: 300px; overflow-y: auto; margin: 15px 0; border: 1px solid #333; border-radius: 10px; }
        .project-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .project-item:hover { background: #222; }

        #charFileInput { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>FIT-FLUENCE MASTER STUDIO v4.9.1</h1>
        <div class="header-btns">
            <button class="h-btn" onclick="saveCurrentProject()">💾 저장</button>
            <button class="h-btn" onclick="openProjectLibrary()">📂 보관함</button>
            <button class="h-btn" onclick="toggleSettings()">⚙️ 지침</button>
        </div>
    </header>

    <div class="main-container">
        <!-- 1. WRITER -->
        <section class="panel zone-scenario">
            <div class="panel-header">
                <span class="panel-title">1. SCENARIO WRITER</span>
            </div>
            <div id="chatHistory"><div class="msg ai-msg">준비되었습니다. 시나리오를 작성해 주세요.</div></div>
            <div style="margin-top:auto;">
                <textarea id="promptInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:10px; margin-bottom:8px; outline:none;" placeholder="내용 입력..." rows="2"></textarea>
                <button id="scenarioBtn" onclick="sendScenario()" class="auto-btn">시나리오 작성 / 수정</button>
                <button onclick="confirmScenario()" style="width:100%; padding:10px; margin-top:5px; background:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:bold; color:#000;">대본 확정 ✨</button>
            </div>
        </section>

        <!-- 2. VISUAL -->
        <section class="panel zone-visual">
            <div class="panel-header"><span class="panel-title">2. VISUAL ASSETS</span></div>
            <div class="char-library">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.7rem; color:var(--gold);">인물 참조</span>
                    <button onclick="document.getElementById('charFileInput').click()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:2px 8px; border-radius:5px; font-size:0.6rem; cursor:pointer;">업로드</button>
                    <input type="file" id="charFileInput" accept="image/*" onchange="handleCharUpload(this)">
                </div>
                <div id="charList" class="char-list"></div>
            </div>

            <div class="option-group">
                <span class="option-label">사이즈</span>
                <div class="grid-3">
                    <div class="opt-btn active" onclick="setSize('16:9', this)">16:9 가로</div>
                    <div class="opt-btn" onclick="setSize('9:16', this)">9:16 세로</div>
                    <div class="opt-btn" onclick="setSize('1:1', this)">1:1 정방</div>
                </div>
            </div>

            <div class="option-group">
                <span class="option-label">스타일</span>
                <div class="grid-3">
                    <div class="opt-btn active" onclick="setStyle('Photo', this)">실사</div>
                    <div class="opt-btn" onclick="setStyle('Animation', this)">애니</div>
                    <div class="opt-btn" onclick="setStyle('3D Render', this)">3D 스타일</div>
                    <div class="opt-btn" onclick="setStyle('Cyberpunk', this)">사이버</div>
                    <div class="opt-btn" onclick="setStyle('Sketch', this)">스케치</div>
                    <div class="opt-btn" onclick="setStyle('Oil Painting', this)">유화</div>
                </div>
            </div>

            <div class="option-group">
                <span class="option-label">성우</span>
                <div class="grid-3">
                    <div class="opt-btn active" onclick="setVoice('ko-KR-Standard-A', this)">여성 1</div>
                    <div class="opt-btn" onclick="setVoice('ko-KR-Standard-B', this)">여성 2</div>
                    <div class="opt-btn" onclick="setVoice('ko-KR-Standard-C', this)">남성 1</div>
                    <div class="opt-btn" onclick="setVoice('ko-KR-Standard-D', this)">남성 2</div>
                </div>
            </div>

            <div id="imageGallery" class="gallery"></div>
            <div id="imageLoader" class="loader">이미지 생성 중...</div>
            <button id="genImageBtn" class="auto-btn" style="display:none;" onclick="autoGenerateImages()">이미지 일괄 생성 🎨</button>
            <button id="downloadImgsBtn" class="h-btn" style="display:none; margin-top:5px; width:100%;" onclick="downloadAllAssets('image')">📥 모든 이미지 다운로드</button>
        </section>

        <!-- 3. MOTION -->
        <section class="panel zone-motion">
            <div class="panel-header"><span class="panel-title">3. MOTION PRODUCTION</span></div>
            <div id="videoGallery" class="gallery"></div>
            <div id="videoLoader" class="loader">영상 합성 중...</div>
            <button id="genVideoBtn" class="auto-btn video-btn" style="display:none;" onclick="autoGenerateVideos()">영상 자동 변환 시작 🎬</button>
            <button id="downloadVidsBtn" class="h-btn" style="display:none; margin-top:5px; width:100%;" onclick="downloadAllAssets('video')">📥 모든 영상 다운로드</button>
        </section>
    </div>

    <div class="master-player-bar">
        <div class="subtitle-box" id="subtitleBox"></div>
        <button id="masterPlayBtn" class="play-btn" onclick="playMasterSequence()">통합 재생 ▶</button>
    </div>

    <div id="projectModal">
        <div class="modal-content">
            <h3 style="color:var(--gold); margin-bottom:15px;">📁 프로젝트 보관함</h3>
            <div class="project-list" id="projectList"></div>
            <button class="auto-btn" style="background:#333; color:#fff;" onclick="closeProjectLibrary()">닫기</button>
        </div>
    </div>

    <div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;">
        <div class="modal-content">
            <h3 style="color:var(--gold);">작가 지침</h3>
            <textarea id="systemInstructions" style="width:100%; height:180px; background:#000; color:#fff; border:1px solid #333; padding:10px; margin:15px 0; border-radius:10px;"></textarea>
            <button class="auto-btn" onclick="saveSettings()">저장 및 적용</button>
            <button class="auto-btn" style="background:#333; color:#fff; margin-top:5px;" onclick="toggleSettings()">닫기</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDVrEMjrPU7ZuBSwy4kFe0NTqQBkOSyHvE";
        let messages = [], currentSize = "16:9", currentStyle = "Photo", currentVoice = "ko-KR-Standard-A", confirmedScenes = [], sessionCharacters = [], isPlaying = false;
        
        document.getElementById('systemInstructions').value = localStorage.getItem('ai_instructions') || "당신은 FIT-FLUENCE의 수석 작가입니다. 정중한 한국어로 시나리오를 작성하세요.";

        const stylePrompts = { 'Photo': 'hyper-realistic photography, 8k, cinematic', 'Animation': 'studio ghibli style, vibrant animation', '3D Render': 'octane render, pixar style, soft light', 'Cyberpunk': 'neon lights, futuristic, synthwave', 'Sketch': 'detailed pencil sketch, charcoal, artistic', 'Oil Painting': 'classic oil painting, brush strokes' };

        function saveCurrentProject() {
            const projects = JSON.parse(localStorage.getItem('studio_projects') || '[]');
            const newProj = { id: Date.now(), title: messages.length > 0 ? messages[0].parts[0].text.substring(0, 20) : "제목 없음", date: new Date().toLocaleString(), messages, confirmedScenes, currentSize, currentStyle, currentVoice };
            projects.unshift(newProj);
            localStorage.setItem('studio_projects', JSON.stringify(projects.slice(0, 10)));
            alert('저장되었습니다.');
        }

        function openProjectLibrary() {
            const list = document.getElementById('projectList');
            const projects = JSON.parse(localStorage.getItem('studio_projects') || '[]');
            list.innerHTML = projects.length ? '' : '<div style="padding:20px; color:#666; text-align:center;">저장된 작업이 없습니다.</div>';
            projects.forEach(p => {
                list.innerHTML += `<div class="project-item" onclick="loadProject(${p.id})"><span style="color:#fff;font-size:0.8rem;">${p.title}...</span><span style="color:#666;font-size:0.6rem;">${p.date}</span></div>`;
            });
            document.getElementById('projectModal').style.display = 'flex';
        }

        function loadProject(id) {
            const projects = JSON.parse(localStorage.getItem('studio_projects') || '[]');
            const p = projects.find(item => item.id === id);
            if(p) { 
                localStorage.setItem('studio_current_load', JSON.stringify(p));
                alert('불러오기 완료! 화면을 새로고침합니다.');
                location.reload(); 
            }
        }

        window.onload = () => {
            const loaded = localStorage.getItem('studio_current_load');
            if(loaded) {
                const p = JSON.parse(loaded);
                messages = p.messages; confirmedScenes = p.confirmedScenes; currentSize = p.currentSize; currentStyle = p.currentStyle; currentVoice = p.currentVoice;
                localStorage.removeItem('studio_current_load');
                addMessage("저장된 프로젝트를 성공적으로 불러왔습니다.", 'ai');
            }
            renderChars();
        };

        function closeProjectLibrary() { document.getElementById('projectModal').style.display = 'none'; }
        function toggleSettings() { const s = document.getElementById('settingsModal'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
        function saveSettings() { localStorage.setItem('ai_instructions', document.getElementById('systemInstructions').value); toggleSettings(); }

        function setStyle(s, el) { currentStyle = s; el.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setSize(s, el) { currentSize = s; el.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setVoice(v, el) { currentVoice = v; el.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

        function handleCharUpload(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (e) => {
                sessionCharacters.push({ id: Date.now(), img: e.target.result, base64: e.target.result.split(',')[1], active: true });
                renderChars(); input.value = '';
            }; reader.readAsDataURL(file);
        }

        function renderChars() {
            const list = document.getElementById('charList'); list.innerHTML = sessionCharacters.length ? '' : '<div style="font-size:0.55rem; color:#444;">사진 업로드</div>';
            sessionCharacters.forEach(c => {
                const card = document.createElement('div'); card.className = `char-card ${c.active ? 'active' : ''}`;
                card.onclick = () => { c.active = !c.active; renderChars(); };
                card.innerHTML = `<img src="${c.img}">`; list.appendChild(card);
            });
        }

        async function sendScenario() {
            const input = document.getElementById('promptInput'), btn = document.getElementById('scenarioBtn'), text = input.value.trim();
            if(!text) return; addMessage(text, 'user'); input.value = ''; btn.disabled = true; btn.innerText = "집필 중...";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [...messages, {role:"user", parts:[{text: text}]}], system_instruction: { parts: [{ text: document.getElementById('systemInstructions').value + " 표는 마크다운 형식을 지켜줘." }] } })
            });
            const data = await res.json();
            if (data.candidates) {
                const aiText = data.candidates[0].content.parts[0].text;
                addMessage(aiText, 'ai'); messages.push({role:"user", parts:[{text: text}]}, {role:"model", parts:[{text: aiText}]});
            }
            btn.disabled = false; btn.innerText = "시나리오 작성 / 수정";
        }

        function addMessage(text, side) {
            const div = document.createElement('div'); div.className = `msg ${side}-msg`;
            if(side === 'ai') { div.innerHTML = marked.parse(text); } else { div.innerText = text; }
            document.getElementById('chatHistory').appendChild(div);
            document.getElementById('chatHistory').scrollTop = document.getElementById('chatHistory').scrollHeight;
        }

        async function confirmScenario() {
            const lastMsg = messages[messages.length-1]?.parts[0].text; if(!lastMsg) return;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{role:"user", parts:[{text: `분할 JSON: [{"scene":1, "narration":"대사", "desc":"묘사"}]만 응답: ${lastMsg}`}]}] })
            });
            const data = await res.json();
            confirmedScenes = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
            for (let scene of confirmedScenes) {
                const ttsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:predict?key=${API_KEY}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ instances: [{ text: scene.narration }], parameters: { voice_name: currentVoice, pitch: 0, speaking_rate: 1.0 } })
                });
                const ttsData = await ttsRes.json();
                if(ttsData.predictions) scene.audioUrl = `data:audio/mp3;base64,${ttsData.predictions[0].audioBytes}`;
            }
            document.getElementById('genImageBtn').style.display = 'block';
            addMessage("대본 확정 완료! 이제 장면별 확인 및 이미지를 생성하세요.", 'ai');
        }

        async function autoGenerateImages() {
            const gallery = document.getElementById('imageGallery'); gallery.innerHTML = '';
            document.getElementById('imageLoader').style.display = 'block';
            for (let i=0; i<confirmedScenes.length; i++) { await generateSingleSceneImage(i); }
            document.getElementById('imageLoader').style.display = 'none';
            document.getElementById('genVideoBtn').style.display = 'block';
            document.getElementById('downloadImgsBtn').style.display = 'block';
        }

        async function generateSingleSceneImage(index) {
            const scene = confirmedScenes[index], gallery = document.getElementById('imageGallery'), activeChar = sessionCharacters.find(c => c.active);
            const card = document.createElement('div'); card.className = 'asset-card'; card.id = `asset-card-${index}`; gallery.appendChild(card);
            let prompt = `${scene.desc}, ${currentStyle} style, ${currentSize} ratio`;
            let body = { instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } };
            if (activeChar) { body.instances[0].image = { bytesBase64Encoded: activeChar.base64 }; body.instances[0].prompt = `Identical person from reference image. Scene: ${scene.desc}.`; }
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY}`, { method: 'POST', body: JSON.stringify(body) });
            const data = await res.json();
            if(data.predictions) {
                const b64 = data.predictions[0].bytesBase64Encoded; scene.base64Image = b64;
                card.innerHTML = `<img src="data:image/png;base64,${b64}" class="video-${currentSize.replace(':','-')}"><div class="asset-edit-box"><textarea id="edit-desc-${index}">${scene.desc}</textarea><div class="small-btn-group"><button class="small-btn btn-listen" onclick="playAudio('${scene.audioUrl}')">🔈 들어보기</button><button class="small-btn btn-redo" onclick="updateAndRedo(${index})">🔄 다시 그리기</button></div></div>`;
            }
        }

        function playAudio(url) { if(url) new Audio(url).play(); }
        async function updateAndRedo(index) { confirmedScenes[index].desc = document.getElementById(`edit-desc-${index}`).value; await generateSingleSceneImage(index); }

        async function autoGenerateVideos() {
            const gallery = document.getElementById('videoGallery'); gallery.innerHTML = ''; 
            document.getElementById('videoLoader').style.display = 'block';
            const activeChar = sessionCharacters.find(c => c.active);
            let completed = 0;
            for (let scene of confirmedScenes) {
                let instances = [{ prompt: `${scene.desc}, cinematic motion` }];
                if (activeChar) { instances[0].image = { bytesBase64Encoded: activeChar.base64 }; instances[0].prompt = `Video of identical person from reference. ${scene.desc}`; }
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/veo-3.1-generate-preview:predictLongRunning?key=${API_KEY}`, { method: 'POST', body: JSON.stringify({ instances }) });
                const op = await res.json();
                pollVideo(op.name, scene, () => { 
                    completed++; if(completed === confirmedScenes.length) {
                        document.getElementById('masterPlayBtn').style.display = 'block';
                        document.getElementById('downloadVidsBtn').style.display = 'block';
                        document.getElementById('videoLoader').style.display = 'none';
                    }
                });
            }
        }

        function pollVideo(opName, scene, onDone) {
            const interval = setInterval(async () => {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${opName}?key=${API_KEY}`);
                const data = await res.json();
                if (data.done) {
                    clearInterval(interval); scene.videoUrl = `data:video/mp4;base64,${data.response.videoBytes}`;
                    const card = document.createElement('div'); card.className = 'asset-card';
                    card.innerHTML = `<video id="vid-${scene.scene}" src="${scene.videoUrl}" class="video-${currentSize.replace(':','-')}" controls muted></video><div class="asset-label">VIDEO S${scene.scene} READY</div>`;
                    document.getElementById('videoGallery').appendChild(card); onDone();
                }
            }, 8000);
        }

        async function playMasterSequence() {
            if (isPlaying) return; isPlaying = true;
            for (const scene of confirmedScenes) {
                const video = document.getElementById(`vid-${scene.scene}`);
                if (video && scene.audioUrl) {
                    video.scrollIntoView({ behavior: 'smooth', block: 'center' }); video.play();
                    document.getElementById('subtitleBox').innerText = scene.narration;
                    const audio = new Audio(scene.audioUrl);
                    await new Promise(res => { audio.onended = res; audio.play(); }); video.pause();
                }
            }
            isPlaying = false;
        }

        function downloadAllAssets(type) {
            confirmedScenes.forEach((scene, i) => {
                const link = document.createElement('a');
                link.href = type === 'image' ? `data:image/png;base64,${scene.base64Image}` : scene.videoUrl;
                link.download = `FIT-FLUENCE_${type}_scene_${scene.scene}.${type === 'image' ? 'png' : 'mp4'}`;
                link.click();
            });
        }
    </script>
</body>
</html>
