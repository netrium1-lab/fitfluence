<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIT-FLUENCE 프리미엄 에디터</title>
    <!-- 폰트 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        @font-face { font-family: 'HyundaiHarmony-Regular'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/HyundaiHarmony-Regular.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'HyundaiHarmony-Bold'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/HyundaiHarmony-Bold.woff2') format('woff2'); font-weight: 700; }
        @font-face { font-family: 'AtoZ-600'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-2@1.0/AtoZ-600.woff2') format('woff2'); font-weight: 600; }
        @font-face { font-family: 'AtoZ-700'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-2@1.0/AtoZ-700.woff2') format('woff2'); font-weight: 700; }

        :root { --gold: #D4AF37; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        .editor-container { width: 100%; height: 100vh; display: flex; flex-direction: column; background: #000; }

        .top-bar { padding: 10px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .logo-mini { color: var(--gold); font-weight: 900; font-size: 1.1rem; margin-right: 20px; }
        .input-title { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px 15px; border-radius: 8px; font-size: 1rem; }
        .select-cate { width: 180px; background: #333; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .workspace { flex: 1; display: flex; overflow: hidden; }
        
        .sidebar { width: 250px; background: #121212; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #222; }
        .sidebar-title { color: var(--gold); font-weight: bold; font-size: 0.85rem; margin-bottom: 10px; display: block; }
        .btn-upload { width: 100%; background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 8px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .img-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
        
        .img-item { background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; position: relative; transition: 0.2s; }
        .img-item.is-main { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .img-item img { width: 100%; height: 80px; object-fit: cover; cursor: pointer; }
        .img-controls { display: flex; background: #1a1a1a; padding: 5px; gap: 3px; }
        .img-btn { flex: 1; font-size: 0.65rem; padding: 4px 0; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .btn-ins { background: var(--gold); color: #000; }
        .btn-rep { background: #444; color: #fff; }
        .btn-rep.active { background: #fff; color: #000; }
        .del-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); color: #fff; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; cursor: pointer; z-index: 5; }

        .main-editor { flex: 1; display: flex; flex-direction: column; background: #000; }
        .toolbar { background: #222; padding: 8px 15px; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
        .tool-group { display: flex; gap: 4px; border-right: 1px solid #444; padding-right: 8px; margin-right: 4px; align-items: center; }
        .tool-btn { background: #333; color: #fff; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; position: relative; }
        .tool-btn:hover { background: var(--gold); color: #000; }
        .tool-select { background: #333; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; font-size: 0.8rem; }

        .popup-menu { display: none; position: absolute; top: 40px; left: 0; background: #222; border: 1px solid #444; padding: 15px; border-radius: 8px; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .menu-title { font-size: 0.75rem; color: var(--gold); margin-bottom: 8px; display: block; font-weight: bold; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 25px); gap: 5px; margin-bottom: 15px; }
        .color-chip { width: 25px; height: 25px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .symbol-grid { display: grid; grid-template-columns: repeat(6, 30px); gap: 5px; width: 220px; }
        .symbol-item { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; background: #333; font-size: 0.9rem; }
        .symbol-item:hover { background: var(--gold); color: #000; }

        .content-area { flex: 1; overflow-y: auto; padding: 50px 0; background: #000; }
        #pContent { max-width: 800px; margin: 0 auto; min-height: 100%; color: #fff; font-size: 1.15rem; line-height: 1.9; outline: none; padding: 20px; }
        #pContent blockquote { border-left: 5px solid var(--gold); padding: 15px 25px; margin: 25px 0; background: rgba(212,175,55,0.05); font-style: italic; color: #ccc; }
        #pContent hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin: 30px 0; }
        #pContent img { max-width: 100%; border-radius: 12px; margin: 30px auto; display: block; }

        .bottom-bar { padding: 10px 20px; background: #1a1a1a; border-top: 1px solid #333; display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
        .file-zone { display: flex; align-items: center; gap: 10px; margin-right: auto; background: #222; padding: 5px 15px; border-radius: 10px; border: 1px dashed #444; }
        .btn { padding: 10px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 0.9rem; border: none; }
        .btn-cancel { background: #333; color: #999; }
        .btn-save { background: var(--gold); color: #000; }

        .draft-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; }
        .draft-content { background: #1a1a1a; border: 1px solid var(--gold); border-radius: 20px; width: 90%; max-width: 500px; padding: 30px; }
        #statusInfo { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 8px 20px; border-radius: 50px; font-weight: bold; font-size: 0.85rem; display: none; z-index: 9999; }
    </style>
</head>
<body onclick="hideAllMenus(event)">
    <div id="statusInfo">처리 중...</div>
    
    <div id="draftModal" class="draft-modal">
        <div class="draft-content">
            <h2 style="color:var(--gold); margin-top:0;">📂 임시 저장 불러오기</h2>
            <div id="draftList" style="max-height:300px; overflow-y:auto; margin:20px 0;">불러오는 중...</div>
            <button class="btn btn-cancel" style="width:100%;" onclick="closeDrafts()">닫기</button>
        </div>
    </div>

    <div class="editor-container">
        <div class="top-bar">
            <div class="logo-mini">FIT-FLUENCE 🖋️</div>
            <select id="pCategory" class="select-cate">
                <option value="건강재테크">건강재테크</option>
                <option value="핏솔루션">핏솔루션</option>
                <option value="맞춤건강안내">맞춤건강안내</option>
                <option value="프리미엄 카드형">프리미엄 카드형</option>
                <option value="커뮤니티">커뮤니티</option>
            </select>
            <input type="text" id="pTitle" class="input-title" placeholder="제목을 입력하세요">
        </div>

        <div class="workspace">
            <div class="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">📸 사진 보관함</span>
                    <button class="btn-upload" onclick="document.getElementById('imgInput').click()">+ 사진 불러오기</button>
                    <input type="file" id="imgInput" style="display:none" onchange="window.processImgs(this)" multiple accept="image/*">
                </div>
                <div id="imgGrid" class="img-grid"></div>
            </div>

            <div class="main-editor">
                <div class="toolbar">
                    <div class="tool-group">
                        <select class="tool-select" onchange="window.execCmd('formatBlock', this.value)">
                            <option value="P">본문</option>
                            <option value="H2">제목 1</option>
                            <option value="H3">제목 2</option>
                            <option value="H4">제목 3</option>
                        </select>
                        <select class="tool-select" onchange="window.execCmd('fontName', this.value)">
                            <option value="Pretendard">기본 글꼴</option>
                            <option value="HyundaiHarmony-Regular">현대 하모니 (R)</option>
                            <option value="HyundaiHarmony-Bold">현대 하모니 (B)</option>
                            <option value="AtoZ-600">에이투지 (6)</option>
                            <option value="AtoZ-700">에이투지 (7)</option>
                            <option value="'Nanum Gothic'">나눔고딕</option>
                            <option value="'Nanum Myeongjo'">나눔명조</option>
                        </select>
                        <select class="tool-select" onchange="window.setFontSize(this.value)">
                            <option value="3">보통</option><option value="1">매우작게</option><option value="2">작게</option><option value="4">약간크게</option><option value="5">크게</option><option value="6">매우크게</option>
                        </select>
                    </div>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="window.execCmd('bold')">B</button>
                        <button class="tool-btn" onclick="window.execCmd('underline')">U</button>
                        <button class="tool-btn" onclick="window.execCmd('strikeThrough')">S</button>
                        
                        <div style="position:relative; display:inline-block;">
                            <button class="tool-btn" onclick="toggleMenu(event, 'colorMenu')" style="border-bottom: 3px solid var(--gold);">색상</button>
                            <div id="colorMenu" class="popup-menu" style="width:150px;">
                                <span class="menu-title">글자색 선택</span>
                                <div class="color-grid">
                                    <div class="color-chip" style="background:#ffffff" onclick="window.execCmd('foreColor','#ffffff')"></div>
                                    <div class="color-chip" style="background:#000000" onclick="window.execCmd('foreColor','#000000')"></div>
                                    <div class="color-chip" style="background:#D4AF37" onclick="window.execCmd('foreColor','#D4AF37')"></div>
                                    <div class="color-chip" style="background:#ff0000" onclick="window.execCmd('foreColor','#ff0000')"></div>
                                    <div class="color-chip" style="background:#00ff00" onclick="window.execCmd('foreColor','#00ff00')"></div>
                                    <div class="color-chip" style="background:#0000ff" onclick="window.execCmd('foreColor','#0000ff')"></div>
                                    <div class="color-chip" style="background:#ffff00" onclick="window.execCmd('foreColor','#ffff00')"></div>
                                    <div class="color-chip" style="background:#ff8800" onclick="window.execCmd('foreColor','#ff8800')"></div>
                                    <div class="color-chip" style="background:#ff00ff" onclick="window.execCmd('foreColor','#ff00ff')"></div>
                                    <input type="color" style="width:25px; height:25px; padding:0; border:none; background:none;" onchange="window.execCmd('foreColor', this.value)">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="tool-group">
                        <button class="tool-btn" onclick="window.execCmd('justifyLeft')">⬅️</button>
                        <button class="tool-btn" onclick="window.execCmd('justifyCenter')">↔️</button>
                        <button class="tool-btn" onclick="window.execCmd('justifyRight')">➡️</button>
                    </div>

                    <div class="tool-group">
                        <button class="tool-btn" onclick="window.execCmd('insertHorizontalRule')">ㅡ 구분선</button>
                        <button class="tool-btn" onclick="window.execCmd('formatBlock', 'blockquote')">❝ 인용구</button>
                        
                        <div style="position:relative; display:inline-block;">
                            <button class="tool-btn" onclick="toggleMenu(event, 'symbolMenu')">Ω 기호</button>
                            <div id="symbolMenu" class="popup-menu symbol-grid">
                                <div class="symbol-item" onclick="insertSymbol('★')">★</div><div class="symbol-item" onclick="insertSymbol('☆')">☆</div><div class="symbol-item" onclick="insertSymbol('○')">○</div><div class="symbol-item" onclick="insertSymbol('●')">●</div><div class="symbol-item" onclick="insertSymbol('◎')">◎</div><div class="symbol-item" onclick="insertSymbol('◆')">◆</div>
                                <div class="symbol-item" onclick="insertSymbol('→')">→</div><div class="symbol-item" onclick="insertSymbol('←')">←</div><div class="symbol-item" onclick="insertSymbol('↑')">↑</div><div class="symbol-item" onclick="insertSymbol('↓')">↓</div><div class="symbol-item" onclick="insertSymbol('↔')">↔</div><div class="symbol-item" onclick="insertSymbol('✔')">✔</div>
                                <div class="symbol-item" onclick="insertSymbol('※')">※</div><div class="symbol-item" onclick="insertSymbol('▶')">▶</div><div class="symbol-item" onclick="insertSymbol('◁')">◁</div><div class="symbol-item" onclick="insertSymbol('▼')">▼</div><div class="symbol-item" onclick="insertSymbol('▲')">▲</div><div class="symbol-item" onclick="insertSymbol('■')">■</div>
                            </div>
                        </div>
                    </div>

                    <div class="tool-group">
                        <button class="tool-btn" onclick="window.insertLink()">🔗 링크</button>
                        <button class="tool-btn" onclick="window.insertVideo()">🎬 영상</button>
                        <button class="tool-btn" onclick="window.insertExternalImg()" style="background:var(--gold); color:#000;">🖼️ 사진주소</button>
                    </div>
                </div>

                <div class="content-area">
                    <div id="pContent" contenteditable="true" placeholder="이곳에 멋진 이야기를 시작하세요..."></div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="file-zone">
                <label style="color:var(--gold); font-size:0.8rem; font-weight:bold;">📁 파일첨부</label>
                <input type="file" id="attachIn" style="font-size:0.7rem; width:120px; color:#999;">
                <input type="text" id="manualFileUrl" placeholder="주소" style="background:#000; border:1px solid #444; color:#fff; padding:5px; border-radius:5px; width:100px; font-size:0.8rem;">
                <input type="text" id="attachPw" placeholder="비번" style="background:#000; border:1px solid #444; color:#fff; padding:5px; border-radius:5px; width:50px; font-size:0.8rem;">
                <button id="delAttachBtn" onclick="deleteExistingFile()" style="display:none; background:#ff4444; color:#fff; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem; cursor:pointer; font-weight:bold; margin-left:5px;">현재 파일 삭제</button>
            </div>
            <button class="btn btn-cancel" onclick="location.href='/admin'">취소</button>
            <button class="btn" style="background:#333; color:var(--gold); border:1px solid var(--gold);" onclick="openDrafts()">📂 불러오기</button>
            <button class="btn" style="background:#222; color:#ccc; border:1px solid #444;" onclick="window.saveDraft()">💾 임시저장</button>
            <button class="btn btn-save" onclick="window.savePost()" id="saveBtn">발행하기</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM", authDomain: "fitflunce.firebaseapp.com", projectId: "fitflunce", storageBucket: "fitflunce.firebasestorage.app", messagingSenderId: "186695294427", appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        let mainThumb = ""; 
        let editId = new URLSearchParams(location.search).get('id');
        let uploadCount = 0;
        let savedSelection = null;

        function saveSelection() {
            const sel = window.getSelection();
            if (sel.getRangeAt && sel.rangeCount) savedSelection = sel.getRangeAt(0);
        }
        function restoreSelection() {
            if (savedSelection) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedSelection);
            }
        }

        window.onload = async function() {
            document.getElementById('pContent').addEventListener('mouseup', saveSelection);
            document.getElementById('pContent').addEventListener('keyup', saveSelection);
            if (editId) {
                const doc = await db.collection('posts').doc(editId).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('pTitle').value = data.title;
                    document.getElementById('pCategory').value = data.category || "건강재테크";
                    document.getElementById('pContent').innerHTML = data.content;
                    mainThumb = data.image;
                    if(mainThumb) addImgToGrid(mainThumb, false);
                    if(data.fileUrl) { 
                        window.currentFileUrl = data.fileUrl; 
                        document.getElementById('manualFileUrl').value = data.fileUrl; 
                        document.getElementById('attachPw').value = data.filePw || ""; 
                        document.getElementById('delAttachBtn').style.display = 'inline-block';
                    }
                }
            }
        };

        async function deleteExistingFile() {
            if(!editId || !window.currentFileUrl) return;
            if(!confirm('현재 첨부된 파일을 서버에서 영구 삭제할까요?\n삭제 후 하단의 [발행하기]를 눌러야 글에 최종 반영됩니다.')) return;
            
            document.getElementById('statusInfo').style.display = 'block';
            document.getElementById('statusInfo').innerText = "파일 삭제 중...";
            
            try {
                if (window.currentFileUrl.includes('firebasestorage')) {
                    try { await storage.refFromURL(window.currentFileUrl).delete(); } catch(e) { console.warn(e); }
                }
                window.currentFileUrl = "";
                document.getElementById('manualFileUrl').value = "";
                document.getElementById('attachPw').value = "";
                document.getElementById('delAttachBtn').style.display = 'none';
                alert('파일이 서버에서 삭제되었습니다.\n[발행하기]를 눌러 글 정보를 업데이트해 주세요.');
            } catch(e) { alert('삭제 실패: ' + e.message); }
            document.getElementById('statusInfo').style.display = 'none';
        }

        function toggleMenu(e, menuId) {
            e.stopPropagation();
            saveSelection();
            document.querySelectorAll('.popup-menu').forEach(m => { if(m.id !== menuId) m.style.display = 'none'; });
            const menu = document.getElementById(menuId);
            menu.style.display = (menu.style.display === 'block' || menu.style.display === 'grid') ? 'none' : (menuId === 'symbolMenu' ? 'grid' : 'block');
        }
        function hideAllMenus() { document.querySelectorAll('.popup-menu').forEach(m => m.style.display = 'none'); }

        window.execCmd = (c, v=null) => {
            const editor = document.getElementById('pContent');
            const scrollPos = document.querySelector('.content-area').scrollTop;
            editor.focus({preventScroll: true});
            restoreSelection();
            
            if ((c === 'justifyCenter' || c === 'justifyLeft' || c === 'justifyRight')) {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const node = sel.anchorNode.parentNode;
                    const targetImg = node.tagName === 'IMG' ? node : (sel.anchorNode.childNodes && sel.anchorNode.childNodes[sel.anchorOffset] && sel.anchorNode.childNodes[sel.anchorOffset].tagName === 'IMG' ? sel.anchorNode.childNodes[sel.anchorOffset] : null);
                    if(targetImg) {
                        const align = c.replace('justify', '').toLowerCase();
                        targetImg.style.display = 'block';
                        if (align === 'center') targetImg.style.margin = '30px auto';
                        else if (align === 'left') { targetImg.style.margin = '30px 0'; targetImg.style.marginLeft = '0'; }
                        else if (align === 'right') { targetImg.style.margin = '30px 0'; targetImg.style.marginLeft = 'auto'; targetImg.style.marginRight = '0'; }
                        saveSelection(); return;
                    }
                }
            }
            document.execCommand(c, false, v);
            saveSelection();
            hideAllMenus();
            document.querySelector('.content-area').scrollTop = scrollPos;
        };

        window.insertSymbol = (sym) => {
            const editor = document.getElementById('pContent');
            const scrollPos = document.querySelector('.content-area').scrollTop;
            editor.focus({preventScroll: true});
            restoreSelection();
            document.execCommand('insertText', false, sym);
            saveSelection();
            hideAllMenus();
            document.querySelector('.content-area').scrollTop = scrollPos;
        };

        window.setFontSize = (s) => { document.getElementById('pContent').focus(); restoreSelection(); document.execCommand('fontSize', false, s); saveSelection(); };
        window.insertLink = () => { const u = prompt("URL:"); if(u) { document.getElementById('pContent').focus(); restoreSelection(); document.execCommand('createLink', false, u); saveSelection(); } };
        window.insertExternalImg = () => { const u = prompt("이미지 주소:"); if(u) { const tag = `<img src="${u}" style="max-width:100%; display:block; margin:30px auto; border-radius:15px;">`; document.getElementById('pContent').focus(); restoreSelection(); document.execCommand('insertHTML', false, tag + '<br>'); saveSelection(); } };
        window.insertVideo = () => { const u = prompt("YouTube URL:"); if(u) { const id = u.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^#\&\?]*)/); if(id) { document.getElementById('pContent').focus(); restoreSelection(); window.execCmd('insertHTML', `<div style="text-align:center;"><iframe width="100%" height="400" src="https://www.youtube.com/embed/${id[1]}" frameborder="0" allowfullscreen></iframe></div><br>`); saveSelection(); } } };

        window.processImgs = async function(input) {
            const files = Array.from(input.files);
            document.getElementById('statusInfo').style.display = 'block';
            for (const file of files) {
                try {
                    const dataUrl = await resizeImg(file, 800, 0.4); 
                    const imgItem = addImgToGrid(dataUrl, true);
                    uploadToStorage(file.name, dataUrl, imgItem);
                } catch (err) {}
            }
            document.getElementById('statusInfo').style.display = 'none';
            input.value = "";
        }

        async function uploadToStorage(fileName, dataUrl, imgItem) {
            try {
                const ref = storage.ref().child(`posts/${Date.now()}_${fileName}`);
                const snap = await ref.putString(dataUrl, 'data_url');
                const serverUrl = await snap.ref.getDownloadURL();
                imgItem.classList.remove('uploading');
                imgItem.querySelector('.btn-ins').onclick = () => window.insertBody(serverUrl);
                imgItem.querySelector('.btn-rep').onclick = () => window.setMainImg(serverUrl, imgItem);
                if(!mainThumb) window.setMainImg(serverUrl, imgItem);
            } catch (e) {
                imgItem.classList.remove('uploading');
                imgItem.querySelector('.btn-ins').onclick = () => window.insertBody(dataUrl);
                imgItem.querySelector('.btn-rep').onclick = () => window.setMainImg(dataUrl, imgItem);
            }
        }

        function resizeImg(file, maxW, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if(w > maxW) { h = h * (maxW/w); w = maxW; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function addImgToGrid(src, isUploading) {
            const div = document.createElement('div');
            div.className = 'img-item' + (isUploading ? ' uploading' : '');
            div.innerHTML = `<button class="del-btn" onclick="this.parentElement.remove()">X</button><img src="${src}" onclick="window.insertBody('${src}')"><div class="img-controls"><button class="img-btn btn-ins" onclick="window.insertBody('${src}')">본문 삽입</button><button class="img-btn btn-rep" onclick="window.setMainImg('${src}', this.parentElement.parentElement)">대표 지정</button></div>`;
            document.getElementById('imgGrid').appendChild(div);
            return div;
        }

        window.setMainImg = function(src, el) {
            mainThumb = src;
            document.querySelectorAll('.img-item').forEach(item => item.classList.remove('is-main'));
            document.querySelectorAll('.btn-rep').forEach(btn => btn.classList.remove('active'));
            el.classList.add('is-main');
            el.querySelector('.btn-rep').classList.add('active');
        }

        window.insertBody = function(src) {
            const tag = `<img src="${src}" style="max-width:100%; display:block; margin:30px auto; border-radius:15px;">`;
            document.getElementById('pContent').focus();
            restoreSelection();
            document.execCommand('insertHTML', false, tag + '<br>');
            saveSelection();
        }

        window.savePost = async function() {
            const content = document.getElementById('pContent').innerHTML;
            const title = document.getElementById('pTitle').value;
            if(!title) return alert("제목을 입력하세요!");
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            document.getElementById('statusInfo').style.display = 'block';
            let fileUrl = document.getElementById('manualFileUrl').value || window.currentFileUrl || "";
            const fileInput = document.getElementById('attachIn');
            try {
                if(fileInput.files[0]) {
                    const f = fileInput.files[0];
                    const ref = storage.ref().child(`attachments/${Date.now()}_${f.name}`);
                    const snap = await ref.put(f);
                    fileUrl = await snap.ref.getDownloadURL();
                }
                const postData = { title, category: document.getElementById('pCategory').value, content, image: mainThumb, fileUrl, filePw: document.getElementById('attachPw').value || "", date: new Date().toLocaleDateString(), status: 'published', updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                if (editId) await db.collection('posts').doc(editId).update(postData);
                else await db.collection('posts').add(postData);
                alert('정상 발행되었습니다!'); location.href = '/admin';
            } catch(e) { alert('실패: ' + e.message); saveBtn.disabled = false; }
            document.getElementById('statusInfo').style.display = 'none';
        }

        window.saveDraft = async function() {
            const content = document.getElementById('pContent').innerHTML;
            const title = document.getElementById('pTitle').value || "제목 없음";
            document.getElementById('statusInfo').style.display = 'block';
            try {
                const postData = { title, category: document.getElementById('pCategory').value, content, image: mainThumb, status: 'draft', updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                if (editId) await db.collection('posts').doc(editId).update(postData);
                else { const res = await db.collection('posts').add(postData); editId = res.id; }
                alert('임시 저장되었습니다.');
            } catch(e) { alert('실패: ' + e.message); }
            document.getElementById('statusInfo').style.display = 'none';
        }

        async function openDrafts() {
            const modal = document.getElementById('draftModal');
            const list = document.getElementById('draftList');
            modal.style.display = 'flex';
            list.innerHTML = "찾는 중...";
            try {
                const snap = await db.collection('posts').where('status', '==', 'draft').get();
                if(snap.empty) { list.innerHTML = "없음"; return; }
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const item = document.createElement('div');
                    item.style.padding = '10px'; item.style.borderBottom = '1px solid #333'; item.style.cursor = 'pointer';
                    item.innerHTML = `<b>${d.title}</b><br><small>${d.updatedAt ? d.updatedAt.toDate().toLocaleString() : ''}</small>`;
                    item.onclick = () => { document.getElementById('pTitle').value = d.title; document.getElementById('pCategory').value = d.category; document.getElementById('pContent').innerHTML = d.content; editId = doc.id; closeDrafts(); };
                    list.appendChild(item);
                });
            } catch(e) { list.innerHTML = "오류"; }
        }
        function closeDrafts() { document.getElementById('draftModal').style.display = 'none'; }
    </script>
</body>
</html>
