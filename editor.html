<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FIT-FLUENCE 프리미엄 에디터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card: #121212; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .editor-container { max-width: 1000px; margin: 40px auto; background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid #333; }
        h1 { color: var(--gold); margin-bottom: 30px; font-weight: 900; text-align: center; }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: var(--gold); font-weight: bold; }
        input, select { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; }

        .library-area { background: #1a1a1a; padding: 25px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #333; }
        .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .img-item { background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #444; display: flex; flex-direction: column; position: relative; }
        .img-item img { width: 100%; height: 120px; object-fit: cover; }
        .insert-btn { background: var(--gold); color: #000; border: none; padding: 10px; font-weight: 900; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .insert-btn:hover { background: #fff; }
        .del-img-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: #fff; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; font-size: 12px; z-index: 10; }

        .toolbar { background: #1a1a1a; padding: 15px; border-radius: 15px 15px 0 0; border: 1px solid #333; border-bottom: none; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .tool-btn { background: #333; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
        .tool-btn:hover { background: var(--gold); color: #000; }
        .tool-select { background: #333; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 8px; font-weight: bold; }
        
        #pContent { width: 100%; min-height: 500px; padding: 30px; background: #000; border: 1px solid #333; border-radius: 0 0 15px 15px; color: #fff; overflow-y: auto; font-size: 1.1rem; line-height: 1.8; outline: none; }
        #pContent img { max-width: 100%; border-radius: 12px; margin: 25px auto; display: block; }
        #pContent iframe { max-width: 100%; border-radius: 12px; margin: 25px auto; display: block; border: none; }
        #pContent a { color: var(--gold); text-decoration: underline; }

        .btn-wrap { margin-top: 50px; text-align: center; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .publish-btn { background: var(--gold); color: #000; border: none; padding: 22px 60px; border-radius: 100px; font-size: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .publish-btn:hover { transform: scale(1.03); background: #f2e3b1; }
        .draft-btn { background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 22px 40px; border-radius: 100px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .cancel-btn { background: #222; color: #888; border: 1px solid #333; padding: 22px 30px; border-radius: 100px; cursor: pointer; }
        
        #statusInfo { display: none; color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; text-align: center; background: rgba(212,175,55,0.1); padding: 8px; border-radius: 8px; }
        #saveMsg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; display: none; z-index: 9999; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="saveMsg">임시 저장되었습니다.</div>
    <div class="editor-container">
        <h1 id="editorTitle">🖋️ FIT-FLUENCE 프리미엄 에디터</h1>
        
        <div class="form-group"><label>카테고리</label><select id="pCategory"><option value="건강재테크">건강재테크</option><option value="핏솔루션">핏솔루션</option><option value="맞춤건강안내">맞춤건강안내</option><option value="커뮤니티">커뮤니티</option></select></div>
        <div class="form-group"><label>제목</label><input type="text" id="pTitle" placeholder="제목을 입력하세요"></div>

        <div class="library-area">
            <label>📸 사진 보관함</label>
            <div id="statusInfo">사진을 처리 중입니다...</div>
            <input type="file" id="imgInput" style="display:none" onchange="window.processImgs(this)" multiple accept="image/*">
            <button onclick="document.getElementById('imgInput').click()" style="background:#333; color:var(--gold); border:1px solid var(--gold); padding:12px 25px; border-radius:12px; cursor:pointer; font-weight:bold;">+ 사진 불러오기</button>
            <div id="imgGrid" class="img-grid"></div>
        </div>

        <div class="toolbar">
            <select class="tool-select" onchange="window.setFontSize(this.value)">
                <option value="3">본문 크기</option>
                <option value="1">매우 작게</option>
                <option value="2">작게</option>
                <option value="4">보통 (16px)</option>
                <option value="5">약간 크게</option>
                <option value="6">크게</option>
                <option value="7">매우 크게</option>
            </select>
            <button class="tool-btn" onclick="window.execCmd('bold')">B</button>
            <button class="tool-btn" onclick="window.execCmd('underline')">U</button>
            <input type="color" title="글자 색상" style="width:35px;height:35px;border:none;background:none;cursor:pointer;" onchange="window.execCmd('foreColor', this.value)">
            
            <button class="tool-btn" onclick="window.execCmd('justifyLeft')">⬅️</button>
            <button class="tool-btn" onclick="window.execCmd('justifyCenter')">↔️</button>
            <button class="tool-btn" onclick="window.execCmd('justifyRight')">➡️</button>

            <button class="tool-btn" onclick="window.insertLink()">🔗 링크</button>
            <button class="tool-btn" onclick="window.insertVideo()">🎬 영상</button>
            <button class="tool-btn" onclick="window.execCmd('insertHorizontalRule')">➖ 구분선</button>
        </div>
        <div id="pContent" contenteditable="true" placeholder="이곳에 내용을 작성하세요..."></div>

        <div class="btn-wrap">
            <button class="draft-btn" onclick="window.saveDraft()">💾 임시저장</button>
            <button class="publish-btn" onclick="window.savePost()" id="saveBtn">발행하기 (홈페이지 반영)</button>
            <button class="cancel-btn" onclick="location.href='admin.html'">취소</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM",
            authDomain: "fitflunce.firebaseapp.com",
            projectId: "fitflunce",
            storageBucket: "fitflunce.firebasestorage.app",
            messagingSenderId: "186695294427",
            appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let mainThumb = ""; 
        let editId = new URLSearchParams(location.search).get('id');

        window.onload = async function() {
            if (editId) {
                document.getElementById('editorTitle').innerText = "🖋️ 게시글 수정하기";
                document.getElementById('saveBtn').innerText = "수정 완료 (저장)";
                const doc = await db.collection('posts').doc(editId).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('pTitle').value = data.title;
                    document.getElementById('pCategory').value = data.category;
                    document.getElementById('pContent').innerHTML = data.content;
                    mainThumb = data.image;
                    if(mainThumb) addImgToGrid(mainThumb);
                }
            } else {
                // 새 글 작성 시 임시 저장된 글 확인
                const draft = localStorage.getItem('fit_post_draft');
                if (draft) {
                    const data = JSON.parse(draft);
                    if (confirm('작성 중이던 임시 저장 글이 있습니다. 불러올까요?')) {
                        document.getElementById('pTitle').value = data.title || '';
                        document.getElementById('pCategory').value = data.category || '건강재테크';
                        document.getElementById('pContent').innerHTML = data.content || '';
                        if(data.image) {
                            mainThumb = data.image;
                            addImgToGrid(mainThumb);
                        }
                    }
                }
            }
            
            // 붙여넣기 시 유튜브 주소 자동 변환
            document.getElementById('pContent').addEventListener('paste', function(e) {
                const text = e.clipboardData.getData('text/plain');
                const youtubeId = window.getYoutubeId(text);
                if (youtubeId) {
                    e.preventDefault();
                    window.insertYoutube(youtubeId);
                }
            });
        };

        // 임시 저장 함수
        window.saveDraft = function() {
            const draftData = {
                title: document.getElementById('pTitle').value,
                category: document.getElementById('pCategory').value,
                content: document.getElementById('pContent').innerHTML,
                image: mainThumb,
                savedAt: new Date().getTime()
            };
            localStorage.setItem('fit_post_draft', JSON.stringify(draftData));
            
            const msg = document.getElementById('saveMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
        }

        window.getYoutubeId = function(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.insertYoutube = function(id) {
            const iframe = `<div style="text-align:center; margin:30px 0;"><iframe width="100%" height="450" src="https://www.youtube.com/embed/${id}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div><br>`;
            document.execCommand('insertHTML', false, iframe);
        }

        window.insertVideo = function() {
            const url = prompt("유튜브 주소를 입력하세요:");
            if (url) {
                const id = window.getYoutubeId(url);
                if (id) window.insertYoutube(id);
                else alert("올바른 유튜브 주소가 아닙니다.");
            }
        }

        window.setFontSize = function(size) {
            document.execCommand('fontSize', false, size);
            document.getElementById('pContent').focus();
        }

        window.processImgs = async function(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;
            document.getElementById('statusInfo').style.display = 'block';
            for (const file of files) {
                try {
                    const dataUrl = await resizeImg(file, 800, 0.6);
                    addImgToGrid(dataUrl);
                    if(!mainThumb) mainThumb = dataUrl;
                    uploadInBackground(file.name, dataUrl);
                } catch (err) { console.error(err); }
            }
            document.getElementById('statusInfo').style.display = 'none';
            input.value = "";
        }

        async function uploadInBackground(fileName, dataUrl) {
            try {
                const ref = storage.ref().child(`posts/${Date.now()}_${fileName}`);
                const snap = await ref.putString(dataUrl, 'data_url');
                const serverUrl = await snap.ref.getDownloadURL();
                if(mainThumb === dataUrl) mainThumb = serverUrl;
            } catch (e) {}
        }

        function resizeImg(file, maxW, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if(w > maxW) { h = h * (maxW/w); w = maxW; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        window.delImg = function(btn, src) {
            btn.parentElement.remove();
            if (mainThumb === src) {
                const remaining = document.querySelector('#imgGrid img');
                mainThumb = remaining ? remaining.src : "";
            }
        }

        function addImgToGrid(src) {
            const div = document.createElement('div');
            div.className = 'img-item';
            div.innerHTML = `
                <button class="del-img-btn" onclick="window.delImg(this, '${src}')">X</button>
                <img src="${src}">
                <button class="insert-btn" onclick="window.insertBody('${src}')">본문 삽입</button>
            `;
            document.getElementById('imgGrid').appendChild(div);
        }

        window.insertBody = function(src) {
            const tag = `<img src="${src}" style="max-width:100%; display:block; margin:30px auto; border-radius:15px;">`;
            document.getElementById('pContent').focus();
            document.execCommand('insertHTML', false, tag + '<br>');
        }

        window.execCmd = function(cmd, val=null) { 
            document.execCommand(cmd, false, val); 
            document.getElementById('pContent').focus(); 
        }
        
        window.insertLink = function() { 
            const url = prompt("링크 주소 (http:// 포함):"); 
            if(url) {
                document.getElementById('pContent').focus();
                document.execCommand('createLink', false, url);
            }
        }

        window.savePost = async function() {
            const title = document.getElementById('pTitle').value;
            const content = document.getElementById('pContent').innerHTML;
            if(!title || !content.trim()) return alert('제목과 내용을 입력하세요!');

            document.getElementById('saveBtn').disabled = true;
            document.getElementById('saveBtn').innerText = "저장 중...";

            const postData = {
                title: title, category: document.getElementById('pCategory').value, content: content,
                image: mainThumb, date: new Date().toLocaleDateString(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if(!editId) postData.createdAt = firebase.firestore.FieldValue.serverTimestamp();

            try {
                if (editId) { await db.collection('posts').doc(editId).update(postData); } 
                else { await db.collection('posts').add(postData); }
                
                // 발행 성공 시 임시 저장 데이터 삭제
                localStorage.removeItem('fit_post_draft');
                
                alert('반영되었습니다!');
                location.href = 'admin.html';
            } catch(e) {
                alert('저장 실패: ' + e.message);
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').innerText = "발행하기";
            }
        }
    </script>
</body>
</html>
