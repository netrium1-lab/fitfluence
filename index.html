    <title>FIT-FLUENCE GROUP | 핏플루언서 맞춤 건강재테크</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --gold: #D4AF37; --metallic-gold: linear-gradient(135deg, #D4AF37 0%, #F2E3B1 50%, #D4AF37 100%); --black: #050505; --card-bg: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--black); color: #fff; line-height: 1.6; overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 12px 0; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 900; color: var(--gold); text-decoration: none; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .admin-btn { background: transparent; color: var(--gold); padding: 6px 15px; border-radius: 30px; font-weight: 600; border: 1px solid var(--gold); cursor: pointer; font-size: 0.75rem; }

        .hero { height: 65vh; display: flex; align-items: center; justify-content: center; position: relative; background: #000 center/cover no-repeat; transition: background 0.5s ease; }
        .hero::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 1; }

        .hero-banners { background: var(--black); padding: 40px 0; text-align: center; }
        .cta-wrap { display: flex; gap: 15px; justify-content: center; align-items: center; flex-direction: column; padding: 0 20px; }
        .main-cta { background: var(--metallic-gold); color: #000; padding: 22px 0; width: 100%; max-width: 350px; border-radius: 100px; font-weight: 900; font-size: 1.2rem; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
        .sub-cta { background: rgba(255, 255, 255, 0.05); color: #fff; padding: 20px 0; width: 100%; max-width: 350px; border-radius: 100px; font-weight: 700; font-size: 1.1rem; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 50px 0; border-bottom: 1px solid #111; }
        .section-title { font-size: 1.6rem; font-weight: 800; color: var(--gold); margin-bottom: 25px; border-left: 4px solid var(--gold); padding-left: 15px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .card-img-wrap { width: 100%; height: 200px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; color: #fff; }

        .footer-promo { background: #000; padding: 80px 20px; text-align: center; }
        .tv-btn { display: inline-flex; align-items: center; justify-content: center; padding: 22px 0; width: 100%; max-width: 350px; border-radius: 60px; background: #ff0000; color: #fff; text-decoration: none; font-weight: 900; font-size: 1.2rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; overflow-y: auto; padding: 20px 10px; }
        .modal-content { background: #111; padding: 30px 20px; border-radius: 25px; width: 95%; max-width: 550px; border: 1px solid var(--gold); margin: 20px auto; }
        .survey-group { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .survey-group b { display: block; margin-bottom: 15px; color: var(--gold); font-size: 1.1rem; }
        .opt { display: inline-block; padding: 12px 18px; background: #222; border: 1px solid #333; border-radius: 12px; margin: 0 8px 8px 0; font-size: 0.95rem; color: #fff; cursor: pointer; }
        .opt.act { background: var(--gold) !important; color: #000 !important; font-weight: bold; }
        .submit-btn { background: var(--metallic-gold); color: #000; padding: 22px; width: 100%; border: none; border-radius: 15px; font-weight: 900; font-size: 1.3rem; margin-top: 30px; cursor: pointer; }

        .post-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; padding: 15px; overflow-y: auto; }
        .post-inner { max-width: 850px; margin: 20px auto; background: #111; border-radius: 25px; border: 1px solid #222; padding: 25px; }
        .post-body { font-size: 1.1rem; line-height: 1.9; color: #ddd; }
        .post-body blockquote { border-left: 5px solid var(--gold); padding: 15px 25px; margin: 25px 0; background: rgba(212,175,55,0.05); font-style: italic; color: #ccc; }
        .post-body hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin: 30px 0; }
        .post-body img { max-width: 100%; border-radius: 15px; margin: 20px 0; display: block; }
        .close-post-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; width: 100%; margin-top: 20px; }

        @media (min-width: 768px) {
            .cta-wrap { flex-direction: row; }
            .hero { height: 100vh; }
            .main-cta, .sub-cta, .tv-btn { width: auto; padding: 24px 70px; }
        }
    </style>
</head>
<body>
    <header><div class="nav-container"><a href="index.html" class="logo" id="mainLogo">FIT-FLUENCE GROUP</a><button class="admin-btn" onclick="enterAdmin()">관리자</button></div></header>

    <main>
        <section class="hero" id="mainHero" aria-label="메인 배경 이미지"></section>

        <section class="hero-banners">
            <div class="cta-wrap">
                <button class="main-cta" onclick="openSurvey()">혈액검사 분석방법 신청</button>
                <button class="main-cta" style="background: linear-gradient(135deg, #ff0055 0%, #ff8800 100%); color:#fff;" onclick="location.href='lucky.html'">🎁 행운권 추첨 이벤트</button>
                <button class="sub-cta" onclick="window.open('https://open.kakao.com/o/gJPgFg7h', '_blank')">핏플루언서그룹 커뮤니티</button>
            </div>
        </section>

        <div class="container">
            <section class="section"><h2 class="section-title">FIT-FLUENCE GROUP 공지사항</h2><div id="list-프리미엄 카드형" class="card-grid"></div></section>
            <section class="section"><h2 class="section-title">건강재테크</h2><div id="list-건강재테크" class="card-grid"></div></section>
            <section class="section"><h2 class="section-title">핏솔루션</h2><div id="list-핏솔루션" class="card-grid"></div></section>
            <section class="section"><h2 class="section-title">맞춤건강안내</h2><div id="list-맞춤건강안내" class="card-grid"></div></section>
        </div>

        <section id="promoSection" class="footer-promo">
            <h2 style="color:var(--gold); margin-bottom:40px; font-size:1.8rem; font-weight:900;">FIT-FLUENCE GROUP</h2>
            <a href="https://youtube.com/@fitfluence" id="link-tv" class="tv-btn" target="_blank">핏플루언서홍보채널</a>
        </section>
    </main>

    <div id="surveyModal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <div id="dynamicSurvey"></div>
            <div style="margin-top:30px;"><b style="display:block; margin-bottom:10px; color:var(--gold);">기타 상담 내용</b><textarea id="uOther" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px; font-size:1rem;" rows="3" placeholder="추가 문의사항..."></textarea></div>
            <input type="text" id="uName" style="width:100%; padding:18px; margin-top:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px;" placeholder="성함">
            <input type="tel" id="uPhone" style="width:100%; padding:18px; margin-top:10px; background:#000; border:1px solid #333; color:#fff; border-radius:12px;" placeholder="연락처">
            <button class="submit-btn" onclick="submitSurvey()">분석 신청 완료</button>
            <p style="text-align:center; margin-top:25px; color:#777; cursor:pointer; font-weight:bold;" onclick="closeSurvey()">창 닫기</p>
        </div>
    </div>

    <div id="postModal" class="post-modal" aria-hidden="true">
        <div class="post-inner">
            <article>
                <div id="modalHeader" style="border-bottom:1px solid #333; margin-bottom:30px; padding-bottom:20px;">
                    <button onclick="copyCurrentUrl()" style="float:right; background:#222; color:var(--gold); border:1px solid var(--gold); padding:5px 12px; border-radius:5px; font-size:0.8rem; cursor:pointer;">🔗 주소 복사</button>
                    <p id="modalCate" style="color:var(--gold); font-weight:bold; margin-bottom:10px; font-size:0.9rem;"></p>
                    <h2 id="modalTitle" style="font-size:1.8rem; color:var(--gold);"></h2>
                </div>
                <div id="modalBody" class="post-body" style="font-size:1.1rem; line-height:1.9; color:#ddd;"></div>
            </article>
            <button class="close-post-btn" onclick="closePost()">목록으로 돌아가기</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM", authDomain: "fitflunce.firebaseapp.com", projectId: "fitflunce", storageBucket: "fitflunce.firebasestorage.app", messagingSenderId: "186695294427", appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function enterAdmin() { var pw = prompt('보안 코드'); if(pw === "7777") { sessionStorage.setItem('fit_auth','true'); location.href='/admin'; } }
        function sel(el) { var opts = el.parentElement.querySelectorAll('.opt'); opts.forEach(o => o.classList.remove('act')); el.classList.add('act'); }
        function closeSurvey() { document.getElementById('surveyModal').style.display='none'; document.body.style.overflow='auto'; }
        
        function closePost() { 
            document.getElementById('postModal').style.display='none'; 
            document.body.style.overflow='auto';
            // 주소창을 원래대로 돌림
            if(window.location.search) {
                history.pushState(null, '', window.location.pathname);
            }
        }

        function copyCurrentUrl() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('이 게시글의 고유 주소가 복사되었습니다! 필요한 곳에 붙여넣기 하세요.');
            });
        }

        async function viewPost(id, isInitialLoad) {
            try {
                const doc = await db.collection('posts').doc(id).get();
                if(!doc.exists) return;
                const p = doc.data();
                document.getElementById('modalCate').innerText = p.category;
                document.getElementById('modalTitle').innerText = p.title;
                
                let bodyHtml = p.content;
                if(p.fileUrl) {
                    bodyHtml += `
                        <div style="margin-top:40px; padding:25px; background:#1a1a1a; border-radius:15px; border:1px solid #333; text-align:center;">
                            <p style="color:#999; font-size:0.9rem; margin-bottom:15px;">🔒 보안 첨부파일이 포함되어 있습니다.</p>
                            <button onclick="downloadSecureFile('${p.fileUrl}', '${p.filePw || ''}')" 
                                style="background:var(--gold); color:#000; border:none; padding:15px 30px; border-radius:10px; font-weight:900; cursor:pointer; font-size:1rem; width:100%;">
                                📁 첨부파일 다운로드 받기
                            </button>
                        </div>`;
                }
                
                document.getElementById('modalBody').innerHTML = bodyHtml;
                const modal = document.getElementById('postModal');
                modal.scrollTop = 0;
                modal.style.display = 'block';
                document.body.style.overflow = 'hidden';

                // 가장 중요한 부분: 주소창을 강제로 바꿈
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?' + id;
                window.history.replaceState({postId: id}, p.title, newUrl);

            } catch(e) { console.error(e); }
        }

        window.onload = async function() {
            try {
                // URL에서 ID 즉시 추출
                const search = window.location.search;
                const postId = search ? search.substring(1).split('&')[0].split('=')[0] : null;

                // 1. 설정 및 기본 데이터 로드
                const cfgDoc = await db.collection('config').doc('site').get();
                if(cfgDoc.exists) {
                    const cfg = cfgDoc.data();
                    if(cfg.logo) document.getElementById('mainLogo').innerText = cfg.logo;
                    if(cfg.img) document.getElementById('mainHero').style.backgroundImage = `url("${cfg.img}")`;
                    if(cfg.bannerLink) document.getElementById('link-tv').href = cfg.bannerLink;
                }

                // 2. 게시글 목록 렌더링
                const snap = await db.collection('posts').get();
                let ps = []; 
                snap.forEach(d => { 
                    var data = d.data(); data.id = d.id; 
                    if(data.status !== 'draft' && data.showHome !== false) ps.push(data);
                });
                ps.sort((a, b) => (a.sortIndex || 0) - (b.sortIndex || 0));

                ['건강재테크', '핏솔루션', '맞춤건강안내', '프리미엄 카드형'].forEach(c => {
                    const el = document.getElementById('list-' + c);
                    if(!el) return;
                    const filtered = ps.filter(p => p.category === c);
                    if(filtered.length) {
                        el.innerHTML = filtered.map(p => `
                            <div class="card" onclick="viewPost('${p.id}')">
                                <div class="card-img-wrap"><img src="${p.image || ''}" class="card-img" onerror="this.parentElement.style.display='none'"></div>
                                <div class="card-body"><h3>${p.title}</h3><p style="color:#666; font-size:0.85rem;">${p.date || ''}</p></div>
                            </div>`).join('');
                    } else {
                        el.innerHTML = '<p style="color:#444; padding:20px;">콘텐츠 준비 중</p>';
                    }
                });

                // 3. 주소에 ID가 있으면 홈페이지가 아닌 게시글을 즉시 띄움
                if(postId && postId.length > 3) { // ID가 유효한 경우에만
                    viewPost(postId, true);
                }

                // 4. 뒤로가기 이벤트
                window.onpopstate = function(event) {
                    if (window.location.search) {
                        const pid = window.location.search.substring(1);
                        viewPost(pid, true);
                    } else {
                        closePost();
                    }
                };

            } catch(e) { console.error("데이터 로딩 오류:", e); }
        };

        function downloadSecureFile(url, correctPw) {
            if(!correctPw) { window.open(url, '_blank'); return; }
            const userPw = prompt("다운로드 비밀번호를 입력하세요.");
            if(userPw === correctPw) { window.open(url, '_blank'); } 
            else if(userPw !== null) { alert("비밀번호가 일치하지 않습니다."); }
        }
    </script>
</body>
</html>
