<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIT-FLUENCE GROUP v1.3</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --gold: #D4AF37; --metallic-gold: linear-gradient(135deg, #D4AF37 0%, #F2E3B1 50%, #D4AF37 100%); --black: #050505; --card-bg: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--black); color: #fff; line-height: 1.6; overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 12px 0; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 900; color: var(--gold); text-decoration: none; }
        .admin-btn { background: transparent; color: var(--gold); padding: 6px 15px; border-radius: 30px; font-weight: 600; border: 1px solid var(--gold); cursor: pointer; font-size: 0.75rem; }

        .hero { height: 65vh; display: flex; align-items: center; justify-content: center; position: relative; background: #111 center/cover no-repeat; transition: background 0.5s ease; }
        .hero::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%); }

        .hero-banners { background: var(--black); padding: 40px 0; text-align: center; }
        .cta-wrap { display: flex; gap: 15px; justify-content: center; align-items: center; flex-direction: column; padding: 0 20px; }
        .main-cta { background: var(--metallic-gold); color: #000; padding: 22px 0; width: 100%; max-width: 350px; border-radius: 100px; font-weight: 900; font-size: 1.2rem; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
        .sub-cta { background: rgba(255, 255, 255, 0.05); color: #fff; padding: 20px 0; width: 100%; max-width: 350px; border-radius: 100px; font-weight: 700; font-size: 1.1rem; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 50px 0; border-bottom: 1px solid #111; }
        .section-title { font-size: 1.6rem; font-weight: 800; color: var(--gold); margin-bottom: 25px; border-left: 4px solid var(--gold); padding-left: 15px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; color: #fff; }

        .footer-promo { background: #000; padding: 80px 20px; text-align: center; }
        .tv-btn { display: inline-flex; align-items: center; justify-content: center; padding: 22px 0; width: 100%; max-width: 350px; border-radius: 60px; background: #ff0000; color: #fff; text-decoration: none; font-weight: 900; font-size: 1.2rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 10px; }
        .modal-content { background: #111; padding: 30px 20px; border-radius: 25px; width: 95%; max-width: 550px; border: 1px solid var(--gold); margin: 20px auto; }
        .survey-group { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .survey-group b { display: block; margin-bottom: 15px; color: var(--gold); font-size: 1.1rem; }
        .opt { display: inline-block; padding: 12px 18px; background: #222; border: 1px solid #333; border-radius: 12px; margin: 0 8px 8px 0; font-size: 0.95rem; color: #fff; cursor: pointer; }
        .opt.act { background: var(--gold) !important; color: #000 !important; font-weight: bold; }
        .submit-btn { background: var(--gold-gradient); color: #000; padding: 22px; width: 100%; border: none; border-radius: 15px; font-weight: 900; font-size: 1.3rem; margin-top: 30px; cursor: pointer; }

        .post-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; padding: 15px; overflow-y: auto; }
        .post-inner { max-width: 850px; margin: 20px auto; background: #111; border-radius: 25px; border: 1px solid #222; padding: 25px; }
        .post-body img { max-width: 100%; border-radius: 15px; margin: 20px 0; display: block; }
        .close-post-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; width: 100%; margin-top: 20px; }

        @media (min-width: 768px) {
            .cta-wrap { flex-direction: row; }
            .hero { height: 100vh; }
            .main-cta, .sub-cta, .tv-btn { width: auto; padding: 24px 70px; }
            .post-inner { padding: 60px; }
            .close-post-btn { width: auto; margin-left: auto; display: block; }
        }
    </style>
</head>
<body>
    <header><div class="nav-container"><a href="index.html" class="logo" id="mainLogo">FIT-FLUENCE GROUP</a><button class="admin-btn" onclick="enterAdmin()">관리자</button></div></header>

    <section class="hero" id="mainHero"></section>

    <section class="hero-banners">
        <div class="cta-wrap">
            <button class="main-cta" onclick="openSurvey()">혈액검사분석신청</button>
            <button class="sub-cta" onclick="scrollToCommunity()">프로모션 이벤트</button>
        </div>
    </section>

    <div class="container">
        <div class="section"><h2 class="section-title">건강재테크</h2><div id="list-건강재테크" class="card-grid"></div></div>
        <div class="section"><h2 class="section-title">핏솔루션</h2><div id="list-핏솔루션" class="card-grid"></div></div>
        <div class="section"><h2 class="section-title">맞춤건강안내</h2><div id="list-맞춤건강안내" class="card-grid"></div></div>
        <div class="section" id="comm"><h2 class="section-title">커뮤니티</h2><div id="list-커뮤니티" class="card-grid"></div></div>
    </div>

    <section class="footer-promo">
        <h2 style="color:var(--gold); margin-bottom:40px; font-size:1.8rem; font-weight:900;">FIT-FLUENCE GROUP</h2>
        <a href="https://youtube.com/@fitfluence" id="link-tv" class="tv-btn" target="_blank">핏플루언서유튜브채널</a>
    </section>

    <div id="surveyModal" class="modal">
        <div class="modal-content">
            <div id="dynamicSurvey"></div>
            <div style="margin-top:30px;"><b style="display:block; margin-bottom:10px; color:var(--gold);">기타 상담 내용</b><textarea id="uOther" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px; font-size:1rem;" rows="3" placeholder="추가 문의사항..."></textarea></div>
            <input type="text" id="uName" style="width:100%; padding:18px; margin-top:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px;" placeholder="성함">
            <input type="tel" id="uPhone" style="width:100%; padding:18px; margin-top:10px; background:#000; border:1px solid #333; color:#fff; border-radius:12px;" placeholder="연락처">
            <button class="submit-btn" onclick="submitSurvey()">분석 신청 완료</button>
            <p style="text-align:center; margin-top:25px; color:#777; cursor:pointer; font-weight:bold;" onclick="closeSurvey()">창 닫기</p>
        </div>
    </div>

    <div id="postModal" class="post-modal">
        <div class="post-inner" onclick="event.stopPropagation()">
            <div id="modalHeader" style="border-bottom:1px solid #333; margin-bottom:30px; padding-bottom:20px;">
                <p id="modalCate" style="color:var(--gold); font-weight:bold; margin-bottom:10px; font-size:0.9rem;"></p>
                <h2 id="modalTitle" style="font-size:1.8rem; color:var(--gold);"></h2>
            </div>
            <div id="modalBody" class="post-body" style="font-size:1.1rem; line-height:1.9; color:#ddd;"></div>
            <button class="close-post-btn" onclick="closePost()">목록으로 돌아가기</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM",
            authDomain: "fitflunce.firebaseapp.com",
            projectId: "fitflunce",
            storageBucket: "fitflunce.firebasestorage.app",
            messagingSenderId: "186695294427",
            appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function enterAdmin() { var pw = prompt('보안 코드'); if(pw === "7777") { sessionStorage.setItem('fit_auth','true'); location.href='admin.html'; } }
        function handleSelect(el) { var opts = el.parentElement.querySelectorAll('.opt'); opts.forEach(o => o.classList.remove('act')); el.classList.add('act'); }
        function closeSurvey() { document.getElementById('surveyModal').style.display='none'; document.body.style.overflow='auto'; }
        function closePost() { document.getElementById('postModal').style.display='none'; document.body.style.overflow='auto'; }
        function scrollToCommunity() { var c = document.getElementById('comm'); if(c) c.scrollIntoView({behavior:'smooth'}); }

        function renderPosts(localPosts, cloudPosts) {
            const combined = [...cloudPosts];
            localPosts.forEach(lp => { if(!combined.find(cp => String(cp.id) === String(lp.id))) combined.push(lp); });
            // sortIndex 기준 정렬
            combined.sort((a,b) => (a.sortIndex || 0) - (b.sortIndex || 0));

            ['건강재테크', '핏솔루션', '맞춤건강안내', '커뮤니티'].forEach(function(c) {
                var el = document.getElementById('list-' + c);
                var filtered = combined.filter(p => p.category === c);
                if(filtered.length) {
                    el.innerHTML = filtered.map(p => `
                        <div class="card" onclick="viewPost('${p.id}')">
                            <img src="${p.image || ''}" class="card-img" onerror="this.style.display='none'">
                            <div class="card-body"><h3>${p.title}</h3><p>${p.date || ''}</p></div>
                        </div>`).join('');
                } else { el.innerHTML = '<p style="color:#333; padding:20px;">콘텐츠 준비 중</p>'; }
            });
        }

        async function openSurvey() {
            var container = document.getElementById('dynamicSurvey');
            var master = JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]');
            try { var doc = await db.collection('config').doc('surveyMaster').get(); if(doc.exists) master = doc.data().items; } catch(e) {}
            
            var html = '<h2 style="color:var(--gold); margin-bottom:30px; text-align:center;">📊 혈액검사 분석 신청</h2>';
            if(!master || master.length === 0) {
                html += '<p style="text-align:center; color:#777; margin-bottom:20px;">항목을 설정하는 중입니다.</p>';
            } else {
                master.forEach(topic => {
                    html += `<div class="survey-group"><b style="display:block; margin-bottom:15px; color:#ccc;">${topic.t || topic.q}</b>`;
                    (topic.o || "").split(',').forEach(opt => { html += `<div class="opt" onclick="handleSelect(this)">${opt.trim()}</div>`; });
                    html += '</div>';
                });
            }
            container.innerHTML = html;
            document.getElementById('surveyModal').style.display='block';
            document.body.style.overflow='hidden';
        }

        async function submitSurvey() {
            var n = document.getElementById('uName').value; var p = document.getElementById('uPhone').value;
            if(!n || !p) return alert('성함과 연락처를 입력해주세요.');
            var ans = Array.from(document.querySelectorAll('.opt.act')).map(o => o.innerText);
            try {
                await db.collection('consults').add({ name: n, phone: p, answers: ans, other: document.getElementById('uOther').value, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                alert('정상 접수되었습니다.'); closeSurvey();
            } catch(e) { alert('오류 발생, 다시 시도해주세요.'); }
        }

        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return '<a href="' + url + '" target="_blank" style="color:var(--gold); text-decoration:underline;">' + url + '</a>';
            });
        }

        async function viewPost(id) {
            var localPs = JSON.parse(localStorage.getItem('fitPosts') || '[]');
            var p = localPs.find(x => String(x.id) === String(id));
            try { var doc = await db.collection('posts').doc(id).get(); if(doc.exists) p = doc.data(); } catch(e) {}
            if(!p) return;
            document.getElementById('modalCate').innerText = p.category;
            document.getElementById('modalTitle').innerText = p.title;
            // 링크 자동 활성화 적용
            document.getElementById('modalBody').innerHTML = linkify(p.content || "");
            document.getElementById('postModal').style.display='block';
            document.body.style.overflow='hidden';
        }

        window.onload = async function() {
            var localCfg = JSON.parse(localStorage.getItem('fitConfig') || '{}');
            var localPosts = JSON.parse(localStorage.getItem('fitPosts') || '[]');
            
            // 초기 로컬 데이터 적용
            if(localCfg.logo) document.getElementById('mainLogo').innerText = localCfg.logo;
            if(localCfg.img) {
                const hero = document.getElementById('mainHero');
                hero.style.backgroundImage = "url('" + localCfg.img + "')";
                hero.style.backgroundSize = "cover";
                hero.style.backgroundPosition = "center";
                hero.style.backgroundRepeat = "no-repeat";
            }
            if(localCfg.bannerLink) document.getElementById('link-tv').href = localCfg.bannerLink;
            renderPosts(localPosts, []);

            try {
                var doc = await db.collection('config').doc('site').get();
                if(doc.exists) {
                    var c = doc.data();
                    if(c.logo) document.getElementById('mainLogo').innerText = c.logo;
                    if(c.img) {
                        const hero = document.getElementById('mainHero');
                        hero.style.backgroundImage = "url('" + c.img + "')";
                        hero.style.backgroundSize = "cover";
                        hero.style.backgroundPosition = "center center";
                        hero.style.backgroundRepeat = "no-repeat";
                        hero.style.display = "flex"; // 이미지가 있으면 확실히 노출
                    }
                    if(c.bannerLink) document.getElementById('link-tv').href = c.bannerLink;
                }
                var snap = await db.collection('posts').get();
                var cloudPosts = [];
                snap.forEach(d => { var data = d.data(); data.id = d.id; cloudPosts.push(data); });
                renderPosts(localPosts, cloudPosts);
            } catch(e) { console.error("Data load error:", e); }
        };
    </script>
</body>
</html>
