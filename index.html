<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIT-FLUENCE GROUP</title>
    <!-- Firebase SDK (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { 
            --gold: #D4AF37; 
            --gold-gradient: linear-gradient(135deg, #F2E3B1 0%, #D4AF37 50%, #A68911 100%);
            --metallic-gold: linear-gradient(135deg, #D4AF37 0%, #F2E3B1 25%, #A68911 50%, #F2E3B1 75%, #D4AF37 100%);
            --black: #050505; --card-bg: #121212; --text-main: #FFFFFF; --text-sub: #888888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--black); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 12px 0; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 900; color: var(--gold); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .admin-btn { background: transparent; color: var(--gold); padding: 6px 15px; border-radius: 30px; font-weight: 600; border: 1px solid var(--gold); cursor: pointer; font-size: 0.75rem; }

        .hero { height: 75vh; display: flex; align-items: center; justify-content: center; position: relative; background: #111 center/cover no-repeat; }
        .hero::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%); }

        .hero-banners { background: var(--black); padding: 50px 0; text-align: center; border-bottom: 1px solid #111; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .cta-wrap { display: flex; gap: 15px; justify-content: center; align-items: center; flex-direction: column; }
        
        .main-cta { background: var(--metallic-gold); color: #000; padding: 20px 0; width: 100%; max-width: 350px; border-radius: 100px; font-weight: 900; font-size: 1.15rem; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2); }
        .sub-cta { background: rgba(255, 255, 255, 0.05); color: #fff; padding: 18px 0; width: 100%; max-width: 350px; border-radius: 100px; font-weight: 700; font-size: 1.05rem; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }

        .section { padding: 60px 0; border-bottom: 1px solid #111; }
        .section-title { font-size: 1.7rem; font-weight: 800; color: var(--gold); margin-bottom: 30px; border-left: 4px solid var(--gold); padding-left: 15px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; color: #fff; }
        .card-body p { font-size: 0.85rem; color: #777; }

        .footer-promo { background: #000; padding: 80px 20px; text-align: center; }
        .tv-btn { display: inline-flex; align-items: center; justify-content: center; padding: 20px 0; width: 100%; max-width: 350px; border-radius: 60px; background: #ff0000; color: #fff; text-decoration: none; font-weight: 900; font-size: 1.1rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 4000; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 25px; width: 100%; max-width: 550px; border: 1px solid var(--gold); margin: 40px 0; }
        .opt { display: inline-block; padding: 12px 18px; background: #222; border: 1px solid #333; border-radius: 12px; margin: 0 8px 8px 0; font-size: 0.9rem; color: #fff; }
        .opt.act { background: var(--gold) !important; color: #000 !important; font-weight: bold; }
        .submit-btn { background: var(--gold-gradient); color: #000; padding: 20px; width: 100%; border: none; border-radius: 15px; font-weight: 900; font-size: 1.2rem; margin-top: 20px; }

        .post-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; padding: 15px; overflow-y: auto; }
        .post-inner { max-width: 850px; margin: 20px auto; background: #111; border-radius: 25px; border: 1px solid #222; padding: 30px; }
        .post-body img { max-width: 100%; border-radius: 15px; margin: 25px 0; display: block; }
        .close-post-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; width: 100%; margin-top: 20px; }

        @media (min-width: 768px) {
            .cta-wrap { flex-direction: row; }
            .hero { height: 100vh; }
            .main-cta, .sub-cta, .tv-btn { width: auto; padding: 24px 60px; }
            .post-inner { padding: 60px; margin: 40px auto; }
            .close-post-btn { width: auto; margin-left: auto; display: block; }
        }
    </style>
</head>
<body>
    <header><div class="nav-container"><a href="index.html" class="logo" id="mainLogo">FIT-FLUENCE GROUP</a><button class="admin-btn" onclick="enterAdmin()">관리자</button></div></header>

    <section class="hero" id="mainHero"></section>

    <section class="hero-banners">
        <div class="container cta-wrap">
            <button class="main-cta" onclick="openSurvey()">혈액검사분석신청</button>
            <button class="sub-cta" onclick="scrollToCommunity()">프로모션 이벤트</button>
        </div>
    </section>

    <div class="container">
        <div class="section"><h2 class="section-title">건강재테크</h2><div id="list-건강재테크" class="card-grid"></div></div>
        <div class="section"><h2 class="section-title">핏솔루션</h2><div id="list-핏솔루션" class="card-grid"></div></div>
        <div class="section"><h2 class="section-title">맞춤건강안내</h2><div id="list-맞춤건강안내" class="card-grid"></div></div>
        <div class="section" id="comm"><h2 class="section-title">커뮤니티</h2><div id="list-커뮤니티" class="card-grid"></div></div>
    </div>

    <section class="footer-promo">
        <h2 style="color:var(--gold); margin-bottom:40px; font-size:1.8rem; font-weight:900;">FIT-FLUENCE GROUP</h2>
        <a href="#" id="link-tv" class="tv-btn" target="_blank">핏플루언서유튜브채널 바로가기</a>
    </section>

    <div id="surveyModal" class="modal">
        <div class="modal-content">
            <div id="dynamicSurvey"></div>
            <div style="margin-top:25px;"><b style="display:block; margin-bottom:10px; color:var(--gold);">기타 상담 내용</b><textarea id="uOther" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px; font-size:1rem;" rows="3" placeholder="추가 문의사항..."></textarea></div>
            <input type="text" id="uName" style="width:100%; padding:18px; margin-top:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px;" placeholder="성함">
            <input type="tel" id="uPhone" style="width:100%; padding:18px; margin-top:10px; background:#000; border:1px solid #333; color:#fff; border-radius:12px;" placeholder="연락처">
            <button class="submit-btn" onclick="submitSurvey()">분석 신청 완료</button>
            <p style="text-align:center; margin-top:20px; color:#555; cursor:pointer;" onclick="closeSurvey()">닫기</p>
        </div>
    </div>

    <div id="postModal" class="post-modal" onclick="closePost()">
        <div class="post-inner" onclick="event.stopPropagation()">
            <div id="modalHeader" style="border-bottom:1px solid #333; margin-bottom:30px; padding-bottom:20px;">
                <p id="modalCate" style="color:var(--gold); font-weight:bold; margin-bottom:10px; font-size:0.9rem;"></p>
                <h2 id="modalTitle" style="font-size:1.8rem; color:var(--gold);"></h2>
            </div>
            <div id="modalBody" class="post-body" style="font-size:1.1rem; line-height:1.9; color:#ddd;"></div>
            <button class="close-post-btn" onclick="closePost()">목록으로 돌아가기</button>
        </div>
    </div>

    <script>
        // 1. Firebase Initialize
        const firebaseConfig = {
            apiKey: "AIzaSyDTKx0Jz4gjZRE9I9PCacHnpHxCW2yeRDM",
            authDomain: "fitflunce.firebaseapp.com",
            projectId: "fitflunce",
            storageBucket: "fitflunce.firebasestorage.app",
            messagingSenderId: "186695294427",
            appId: "1:186695294427:web:c2b9ddaed28624bbcc5bfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Core Functions
        function enterAdmin() {
            var pw = prompt('보안 코드를 입력하세요.');
            if (pw === "7777") { sessionStorage.setItem('fit_auth', 'true'); location.href = 'admin.html'; }
        }

        function handleSelect(el) {
            var opts = el.parentElement.querySelectorAll('.opt');
            for(var i=0; i<opts.length; i++) opts[i].classList.remove('act');
            el.classList.add('act');
        }

        function openSurvey() {
            db.collection('config').doc('surveyMaster').get().then(function(doc) {
                var master = (doc.exists) ? doc.data().items : JSON.parse(localStorage.getItem('fitSurveyMaster') || '[]');
                var container = document.getElementById('dynamicSurvey');
                var html = '<h2 style="color:var(--gold); margin-bottom:30px; text-align:center;">📊 혈액검사 분석 신청</h2>';
                master.forEach(function(topic) {
                    html += '<div class="survey-group" style="margin-bottom:20px;"><b style="display:block; margin-bottom:10px; color:#ccc;">' + (topic.t || topic.q) + '</b>';
                    (topic.o || "").split(',').forEach(function(opt) { 
                        html += '<div class="opt" onclick="handleSelect(this)">' + opt.trim() + '</div>'; 
                    });
                    html += '</div>';
                });
                container.innerHTML = html;
                document.getElementById('surveyModal').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            });
        }

        function submitSurvey() {
            var n = document.getElementById('uName').value;
            var p = document.getElementById('uPhone').value;
            if(!n || !p) return alert('성함과 연락처를 입력해주세요.');
            var acts = document.querySelectorAll('.opt.act');
            var ans = [];
            for(var i=0; i<acts.length; i++) ans.push(acts[i].innerText);
            
            db.collection('consults').add({
                name: n, phone: p, answers: ans, 
                other: document.getElementById('uOther').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(function() {
                alert('정상적으로 접수되었습니다.');
                closeSurvey();
            }).catch(function() {
                alert('접수 중 오류가 발생했습니다.');
            });
        }

        function closeSurvey() { document.getElementById('surveyModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function viewPost(id) {
            db.collection('posts').doc(id).get().then(function(doc) {
                var p = doc.exists ? doc.data() : null;
                if(!p) {
                    var localPs = JSON.parse(localStorage.getItem('fitPosts') || '[]');
                    p = localPs.find(function(x) { return String(x.id) === String(id); });
                }
                if(!p) return;
                document.getElementById('modalCate').innerText = p.category;
                document.getElementById('modalTitle').innerText = p.title;
                document.getElementById('modalBody').innerHTML = p.content;
                document.getElementById('postModal').style.display = 'block';
                document.body.style.overflow = 'hidden';
            });
        }

        function closePost() { document.getElementById('postModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function scrollToCommunity() { var comm = document.getElementById('comm'); if(comm) comm.scrollIntoView({ behavior: 'smooth' }); }

        // 3. Init Load
        window.onload = function() {
            // Load Config
            db.collection('config').doc('site').get().then(function(doc) {
                var cfg = doc.exists ? doc.data() : JSON.parse(localStorage.getItem('fitConfig') || '{}');
                if(cfg.logo) document.getElementById('mainLogo').innerText = cfg.logo;
                if(cfg.img) document.getElementById('mainHero').style.backgroundImage = 'url(' + cfg.img + ')';
                if(cfg.bannerLink) document.getElementById('link-tv').href = cfg.bannerLink;
            });

            // Load Posts
            db.collection('posts').get().then(function(snap) {
                var allPosts = [];
                snap.forEach(function(doc) { 
                    var d = doc.data(); d.id = doc.id;
                    allPosts.push(d); 
                });
                // Sort by ID or Date manually for stability
                allPosts.sort(function(a, b) { return b.id > a.id ? 1 : -1; });

                var localPosts = JSON.parse(localStorage.getItem('fitPosts') || '[]');
                localPosts.forEach(function(lp) {
                    var exists = allPosts.some(function(cp) { return String(cp.id) === String(lp.id); });
                    if(!exists) allPosts.push(lp);
                });

                ['건강재테크', '핏솔루션', '맞춤건강안내', '커뮤니티'].forEach(function(c) {
                    var el = document.getElementById('list-' + c);
                    var filtered = allPosts.filter(function(p) { return p.category === c; });
                    if(filtered.length) {
                        el.innerHTML = filtered.map(function(p) {
                            return '<div class="card" onclick="viewPost(\'' + p.id + '\')">' +
                                '<img src="' + (p.image || '') + '" class="card-img" onerror="this.style.display=\'none\'">' +
                                '<div class="card-body"><h3>' + p.title + '</h3><p>' + (p.date || '') + '</p></div></div>';
                        }).join('');
                    } else {
                        el.innerHTML = '<p style="color:#333; padding:20px;">콘텐츠 준비 중</p>';
                    }
                });
            });
        };
    </script>
</body>
</html>
